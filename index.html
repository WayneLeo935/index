<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人工作台</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #000;
            width: 100vw;
            height: 100vh;
        }

        /* 极致毛玻璃效果 - 增加了饱和度和模糊度，更有苹果味 */
        .apple-glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.4);
        }

        /* 背景层 */
        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2560');
            background-size: cover; 
            background-position: center;
            z-index: -2; 
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.5); 
            align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(20px);
        }
        .modal.active { display: flex; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .hover-lift { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-8px); filter: brightness(1.2); }

        /* 富文本工具栏 */
        .toolbar {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .toolbar-btn {
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            opacity: 0.5;
        }
        .toolbar-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
        .toolbar-btn.active {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
        }
        .rich-editor {
            flex: 1;
            outline: none;
            overflow-y: auto;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        /* 分组标签栏 */
        .group-tab {
            padding: 0.4rem 0.9rem;
            border-radius: 0.5rem;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .group-tab:hover { opacity: 0.65; background: rgba(255,255,255,0.08); }
        .group-tab.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .rich-editor:empty:before {
            content: attr(placeholder);
            opacity: 0.2;
        }

        /* 页面载入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.02); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0px); }
        }
        .animate-page { animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        /* 搜索框美化 */
        .search-container {
            position: relative;
        }
        .engine-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 0.75rem;
            width: 10rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 60;
        }
        .engine-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .engine-option {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1.5rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: background 0.2s;
        }
        .engine-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 统一输入框与按钮样式 */
        input, select, textarea {
            transition: all 0.3s ease;
        }
        
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 自定义 Todo 输入框样式 */
        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .apple-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            outline: none;
            width: 100%;
        }
        .apple-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        select.apple-input {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            color: white;
        }
        select.apple-input option {
            background: #1c1c2e;
            color: white;
        }
    </style>
</head>
<body class="text-white animate-page">

    <div id="bg-overlay"></div>
    <div class="fixed inset-0 bg-black/10 z-[-1]"></div>

    <div class="h-screen w-full flex flex-col p-10 lg:p-12 relative">
        
        <!-- 顶部：设置按钮 -->
        <div class="flex justify-end items-start z-10">
            <div class="flex gap-4 mt-2">
                <!-- 音乐下拉菜单 -->
                <div class="relative group/audio">
                    <button id="audio-btn" class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all flex items-center justify-center">
                        <i id="audio-main-icon" data-lucide="music" class="w-6 h-6"></i>
                    </button>
                    <!-- 下拉列表 -->
                    <div class="absolute right-0 mt-3 py-3 w-48 apple-glass rounded-[1.8rem] opacity-0 invisible group-hover/audio:opacity-100 group-hover/audio:visible transition-all duration-500 z-50 transform translate-y-2 group-hover/audio:translate-y-0">
                        <div class="px-6 py-2 mb-1 text-[9px] opacity-30 font-black tracking-[0.3em] uppercase">Soundscape</div>
                        <button onclick="changeAudio('none')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="volume-x" class="w-4 h-4 opacity-50"></i> Mute
                        </button>
                        <button onclick="changeAudio('rain')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="cloud-rain" class="w-4 h-4 opacity-50"></i> Rainy Day
                        </button>
                        <button onclick="changeAudio('white')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="wind" class="w-4 h-4 opacity-50"></i> White Noise
                        </button>
                        <button onclick="changeAudio('soothing')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="coffee" class="w-4 h-4 opacity-50"></i> Soothing
                        </button>
                    </div>
                </div>
                
                <button onclick="toggleModal('settings-modal')" class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all">
                    <i data-lucide="settings-2" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- 中间：时钟、天气与搜索 -->
        <div class="flex flex-col items-center justify-start mt-[-2rem] lg:mt-[-4rem]">
            <div class="w-full max-w-3xl flex flex-col items-center">
                
                <!-- 时间与天气容器 -->
                <div class="flex flex-col items-center mb-6 animate-page">
                    <div id="time" class="text-[120px] lg:text-[140px] font-[200] tracking-tighter leading-none mb-4">00:00</div>
                    <div class="flex items-center gap-6 mb-8">
                        <div id="date" class="text-[12px] tracking-[0.5em] uppercase font-bold border-r border-white/20 pr-6 text-white">JAN 01, MONDAY</div>
                        <div id="weather" class="flex items-center gap-2 text-[12px] tracking-[0.3em] uppercase font-bold text-white">
                            <span id="weather-temp">--°C</span>
                            <span id="weather-desc">Loading...</span>
                        </div>
                    </div>

                    <!-- 每日格言 -->
                    <div id="hitokoto-container" class="max-w-xl text-center px-4 mb-8 h-16 flex flex-col justify-center">
                        <p id="hitokoto" class="text-lg font-normal tracking-widest text-white italic drop-shadow-sm"></p>
                        <p id="hitokoto-from" class="text-[11px] font-bold tracking-[0.3em] uppercase text-white mt-2"></p>
                    </div>
                </div>

                <!-- 搜索框 -->
                <div class="apple-glass rounded-full p-2.5 flex items-center w-full focus-within:ring-[12px] ring-white/5 transition-all duration-700 shadow-2xl search-container">
                    <div class="relative">
                        <button id="engine-current" onclick="toggleEngineDropdown(event)" class="text-[12px] px-8 py-3 outline-none cursor-pointer border-r border-white/20 font-black uppercase tracking-[0.2em] text-center text-white flex items-center gap-2 hover:bg-white/5 rounded-l-full transition-colors">
                            <span id="current-engine-name">Baidu</span>
                            <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i>
                        </button>
                        
                        <!-- 自定义下拉菜单 -->
                        <div id="engine-dropdown" class="engine-dropdown apple-glass rounded-[1.8rem] overflow-hidden py-2">
                            <button onclick="setSearchEngine('baidu')" class="engine-option">Baidu</button>
                            <button onclick="setSearchEngine('google')" class="engine-option">Google</button>
                            <button onclick="setSearchEngine('bing')" class="engine-option">Bing</button>
                        </div>
                    </div>
                    <input type="text" id="search-input" placeholder="Discovery starts here..." 
                           class="flex-1 bg-transparent border-none outline-none px-6 text-xl placeholder:text-white/20 font-light text-white selection:bg-white/30"
                           onkeydown="if(event.key === 'Enter') performSearch()">
                    <button onclick="performSearch()" class="bg-white/10 hover:bg-white/30 p-5 rounded-full transition-all">
                        <i data-lucide="search" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 下方分栏区域 -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8 mt-12 overflow-hidden pb-4">
            <!-- 左分栏：常用网站 -->
            <div class="apple-glass rounded-[2.5rem] p-8 flex flex-col overflow-hidden group/shortcuts">
                <div class="flex items-center mb-4">
                    <div class="flex items-center gap-3 text-[18px] uppercase tracking-[0.4em] font-normal">
                        <i data-lucide="layout-grid" class="w-6 h-6"></i> 快捷方式
                    </div>
                </div>
                <!-- 分组标签栏 -->
                <div id="group-tabs" class="flex items-center gap-1 pt-1 mb-4 pb-3 border-b border-white/10 overflow-x-auto no-scrollbar"></div>
                <!-- 书签网格 + 右侧竖向分页 -->
                <div class="flex-1 flex gap-2 min-h-0">
                    <div class="flex-1 min-h-0">
                        <div class="grid grid-cols-4 gap-3" id="bookmarks-grid"></div>
                    </div>
                    <!-- 竖向分页控件 -->
                    <div class="flex flex-col items-center justify-center gap-1.5 opacity-0 group-hover/shortcuts:opacity-40 transition-opacity">
                        <button onclick="prevPage()" class="hover:opacity-100 transition-opacity"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                        <span id="page-indicator" class="text-[10px] font-black leading-none">1/1</span>
                        <button onclick="nextPage()" class="hover:opacity-100 transition-opacity"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>

            <!-- 中分栏：Note / Todo 切换 -->
            <div class="apple-glass rounded-[2.5rem] p-8 flex flex-col overflow-hidden relative">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex gap-4">
                        <button onclick="switchTab('note')" id="tab-note" class="flex items-center gap-3 text-[18px] uppercase tracking-[0.4em] font-normal transition-all" style="opacity:1"><i data-lucide="file-text" class="w-6 h-6"></i>笔记</button>
                        <button onclick="switchTab('todo')" id="tab-todo" class="flex items-center gap-3 text-[18px] uppercase tracking-[0.4em] font-normal transition-all" style="opacity:0.3"><i data-lucide="check-square" class="w-6 h-6"></i>待办</button>
                    </div>
                    <div id="todo-add-btn" class="hidden">
                        <button onclick="addTodo()" class="opacity-30 hover:opacity-100 transition-all"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>
                
                <div id="pane-note" class="flex-1 flex flex-col overflow-hidden">
                    <div class="toolbar">
                        <button onclick="formatDoc('bold')" class="toolbar-btn" title="加粗"><i data-lucide="bold" class="w-4 h-4"></i></button>
                        <button onclick="formatDoc('italic')" class="toolbar-btn" title="斜体"><i data-lucide="italic" class="w-4 h-4"></i></button>
                        <button onclick="formatDoc('underline')" class="toolbar-btn" title="下划线"><i data-lucide="underline" class="w-4 h-4"></i></button>
                        <div class="w-px h-4 bg-white/10 my-auto mx-1"></div>
                        <button onclick="formatDoc('fontSize', '5')" class="toolbar-btn" title="大字号"><i data-lucide="heading-1" class="w-4 h-4"></i></button>
                        <button onclick="formatDoc('fontSize', '3')" class="toolbar-btn" title="中字号"><i data-lucide="heading-2" class="w-4 h-4"></i></button>
                        <button onclick="formatDoc('fontSize', '2')" class="toolbar-btn" title="小字号"><i data-lucide="type" class="w-4 h-4"></i></button>
                        <div class="w-px h-4 bg-white/10 my-auto mx-1"></div>
                        <button onclick="formatDoc('justifyLeft')" class="toolbar-btn" title="左对齐"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                        <button onclick="formatDoc('justifyCenter')" class="toolbar-btn" title="居中"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                        <div class="relative flex items-center">
                            <button class="toolbar-btn" title="自定义颜色"><i data-lucide="palette" class="w-4 h-4"></i></button>
                            <input type="color" oninput="formatDoc('foreColor', this.value)" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        </div>
                        <button onclick="formatDoc('removeFormat')" class="toolbar-btn" title="清除格式"><i data-lucide="eraser" class="w-4 h-4"></i></button>
                    </div>
                    <div id="notepad" contenteditable="true" class="rich-editor no-scrollbar" placeholder="开始记录你的想法..."></div>
                </div>
                
                <div id="pane-todo" class="flex-1 hidden overflow-y-auto no-scrollbar space-y-3">
                    <div id="todo-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- 右分栏：桌面宠物 -->
            <div class="apple-glass rounded-[2.5rem] p-8 flex flex-col items-center justify-center overflow-hidden">
                <div class="flex items-center gap-3 mb-6 text-[18px] uppercase tracking-[0.4em] font-normal self-start">
                    <i data-lucide="heart" class="w-6 h-6"></i> 宠物
                </div>
                <div class="flex-1 flex flex-col items-center justify-center">
                    <div id="pet" class="text-6xl mb-4 transition-all duration-500 cursor-pointer hover:scale-110">🐱</div>
                    <div id="pet-status" class="text-[10px] opacity-40 uppercase tracking-[0.2em] font-black">很高兴见到你!</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="donate-modal" class="modal">
        <div class="apple-glass p-16 rounded-[4.5rem] max-w-sm w-full text-center relative mx-4">
            <button onclick="toggleModal('donate-modal')" class="absolute top-10 right-10 opacity-30 hover:opacity-100"><i data-lucide="x"></i></button>
            <h3 class="text-3xl font-light mb-4 tracking-tight">赞助作者</h3>
            <div class="bg-white/90 p-6 rounded-[3rem] inline-block mb-8">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=Donation" alt="QR" class="w-44 h-44 opacity-80">
            </div>
            <p class="text-[10px] opacity-30 uppercase tracking-[0.5em] font-black italic">Thanks for your coffee!</p>
        </div>
    </div>

    <div id="bookmark-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-md w-full relative modal-content">
            <h3 id="bm-modal-title" class="text-2xl font-light mb-10 tracking-tight">添加快捷方式</h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[9px] uppercase tracking-[0.3em] font-black opacity-30 ml-4">名称</label>
                    <input type="text" id="bm-name" class="apple-input font-light" placeholder="例如: GitHub">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] uppercase tracking-[0.3em] font-black opacity-30 ml-4">链接地址</label>
                    <input type="text" id="bm-url" class="apple-input font-light" placeholder="https://...">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] uppercase tracking-[0.3em] font-black opacity-30 ml-4">所属分组</label>
                    <select id="bm-group" class="apple-input font-light"></select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeBookmarkModal()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 py-5 rounded-[2rem] transition-all text-[10px] uppercase tracking-widest font-black opacity-50 hover:opacity-100">取消</button>
                    <button id="bm-save-btn" onclick="saveBookmark()" class="flex-1 bg-white text-black font-black py-5 rounded-[2rem] hover:scale-[1.02] active:scale-[0.98] transition-all text-[10px] uppercase tracking-widest">确认保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建/重命名分组 modal -->
    <div id="group-name-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-sm w-full relative modal-content">
            <h3 id="group-modal-title" class="text-2xl font-light mb-10 tracking-tight">新建分组</h3>
            <input type="text" id="group-name-input" class="apple-input font-light mb-6" placeholder="分组名称...">
            <div class="flex gap-4">
                <button onclick="toggleModal('group-name-modal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[2rem] text-[10px] uppercase tracking-widest font-black opacity-50">取消</button>
                <button onclick="confirmGroupName()" class="flex-1 bg-white text-black font-black py-5 rounded-[2rem] text-[10px] uppercase tracking-widest">确认</button>
            </div>
        </div>
    </div>

    <!-- 删除分组确认 modal -->
    <div id="delete-group-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-md w-full relative modal-content">
            <h3 id="del-group-title" class="text-2xl font-light mb-4 tracking-tight">删除分组</h3>
            <p id="del-group-msg" class="text-sm opacity-50 mb-8 leading-relaxed font-light"></p>
            <div id="del-group-move-section" class="space-y-2 mb-8 hidden">
                <label class="text-[9px] uppercase tracking-[0.3em] font-black opacity-30 ml-4">书签移入</label>
                <select id="del-group-target" class="apple-input font-light"></select>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleModal('delete-group-modal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[2rem] text-[10px] uppercase tracking-widest font-black opacity-50">取消</button>
                <button onclick="executeDeleteGroup()" class="flex-1 bg-red-500/80 hover:bg-red-500 text-white font-black py-5 rounded-[2rem] text-[10px] uppercase tracking-widest transition-all">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 分组右键/长按菜单 -->
    <div id="group-ctx-menu" class="hidden fixed z-50 apple-glass rounded-2xl p-2 shadow-xl min-w-[120px]">
        <button onclick="openRenameGroupModal()" class="w-full text-left px-3 py-2 text-[11px] uppercase tracking-[0.08em] font-bold rounded-xl hover:bg-white/10 transition-all">重命名</button>
        <button id="ctx-delete-btn" onclick="confirmDeleteGroup()" class="w-full text-left px-3 py-2 text-[11px] uppercase tracking-[0.08em] font-bold rounded-xl hover:bg-red-500/20 text-red-300 transition-all">删除</button>
    </div>

    <div id="todo-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-md w-full relative modal-content">
            <h3 class="text-2xl font-light mb-10 tracking-tight">添加待办事项</h3>
            <div class="space-y-6">
                <input type="text" id="todo-input" class="apple-input font-light" placeholder="输入任务内容...">
                <div class="flex gap-4 pt-4">
                    <button onclick="toggleModal('todo-modal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[2rem] text-[10px] uppercase tracking-widest font-black opacity-50">取消</button>
                    <button onclick="confirmAddTodo()" class="flex-1 bg-white text-black font-black py-5 rounded-[2rem] text-[10px] uppercase tracking-widest">添加任务</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-md w-full relative">
            <button onclick="toggleModal('settings-modal')" class="absolute top-10 right-10 opacity-30 hover:opacity-100"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-light mb-10 tracking-tight">设置</h3>
            <div class="space-y-8">
                <div class="inline-flex rounded-2xl overflow-hidden border border-white/20 bg-white/5 p-1 w-full">
                    <button id="bg-mode-url" onclick="setBgMode('url')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">网络图片</button>
                    <button id="bg-mode-local" onclick="setBgMode('local')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">本地图片</button>
                    <button id="bg-mode-presets" onclick="setBgMode('presets')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">预设风景</button>
                </div>

                <div id="bg-pane-url" class="space-y-4">
                    <input type="text" id="bg-url" class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 outline-none font-light" placeholder="图片链接 (https://...jpg/png/webp)">
                    <button onclick="applyBgFromUrl()" class="w-full bg-white text-black font-black py-5 rounded-[2.5rem]">应用网络壁纸</button>
                </div>

                <div id="bg-pane-local" class="space-y-4 hidden">
                    <input type="file" id="bg-file" accept="image/*" class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 outline-none font-light">
                    <button onclick="applyBgFromLocal()" class="w-full bg-white text-black font-black py-5 rounded-[2.5rem]">应用本地壁纸</button>
                    <p class="text-[10px] opacity-40 tracking-[0.25em] uppercase font-black">提示：本地图片会以数据形式保存在浏览器里</p>
                </div>

                <div id="bg-pane-presets" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3" id="presets-grid">
                        <!-- 动态渲染预设图片 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        lucide.createIcons();

        // --- 快捷方式分组数据 ---
        function loadGroups() {
            const saved = localStorage.getItem('shortcuts.groups');
            if (saved) return JSON.parse(saved);

            // 从旧格式迁移，保留数据不丢失
            const old = localStorage.getItem('bookmarks_v7');
            if (old) {
                const migrated = [{ id: 'group-default', name: '默认', bookmarks: JSON.parse(old) }];
                localStorage.setItem('shortcuts.groups', JSON.stringify(migrated));
                return migrated;
            }

            // 首次默认分组
            return [
                {
                    id: 'group-work',
                    name: '工作',
                    bookmarks: [
                        { name: 'Github', url: 'https://github.com', icon: 'github' },
                        { name: 'ArchDaily', url: 'https://archdaily.com', icon: 'layout' }
                    ]
                },
                {
                    id: 'group-fun',
                    name: '娱乐',
                    bookmarks: [
                        { name: 'Bilibili', url: 'https://bilibili.com', icon: 'tv' },
                        { name: 'Pinterest', url: 'https://pinterest.com', icon: 'image' }
                    ]
                }
            ];
        }

        function saveGroups() {
            localStorage.setItem('shortcuts.groups', JSON.stringify(groups));
        }

        function getCurrentBookmarks() {
            const g = groups.find(g => g.id === currentGroupId);
            return g ? g.bookmarks : (groups[0]?.bookmarks || []);
        }

        let groups = loadGroups();
        let currentGroupId = groups[0]?.id || null;

        // 默认分组（工作/娱乐）只能重命名，不可删除
        const PROTECTED_GROUP_IDS = new Set(['group-work', 'group-fun']);
        function isGroupProtected(id) { return PROTECTED_GROUP_IDS.has(id); }

        let todos = JSON.parse(localStorage.getItem('todos_v7')) || [
            { id: 1, text: '开始设计第一稿', completed: false }
        ];

        const itemsPerPage = 7; // 7个书签 + 1个添加按钮 = 8格（4列×2行）
        // 页数 = ceil(书签数 / 每页数)，最少 1 页；最后一页始终显示添加按钮
        function getTotalPages(bms) {
            return Math.max(1, Math.ceil(bms.length / itemsPerPage));
        }

        // 每个分组独立记忆当前页，存入 localStorage
        let groupPages = JSON.parse(localStorage.getItem('shortcuts.pages')) || {};
        function savePages() { localStorage.setItem('shortcuts.pages', JSON.stringify(groupPages)); }
        function getCurrentPage() { return groupPages[currentGroupId] || 0; }
        function setCurrentPage(n) { groupPages[currentGroupId] = n; savePages(); }

        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');
            const page = getCurrentPage();
            const start = page * itemsPerPage;
            const end = start + itemsPerPage;
            const bms = getCurrentBookmarks();
            const pageItems = bms.slice(start, end);

            const totalPages = getTotalPages(bms);
            document.getElementById('page-indicator').innerText = `${page + 1}/${totalPages}`;

            let html = pageItems.map((s, index) => {
                const globalIndex = start + index;
                return `
                <div class="flex flex-col items-center gap-2 group relative">
                    <div class="absolute -top-2 -right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all z-10">
                        <button onclick="editBookmark(${globalIndex})" class="bg-white/20 backdrop-blur-md rounded-full p-1.5 hover:bg-white/40"><i data-lucide="edit-2" class="w-3 h-3"></i></button>
                        <button onclick="deleteBookmark(${globalIndex})" class="bg-red-500/60 backdrop-blur-md rounded-full p-1.5 hover:bg-red-600/80"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>
                    <a href="${s.url}" target="_blank" class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center hover-lift group-hover:bg-white/30 shadow-sm">
                        <i data-lucide="${s.icon || 'link-2'}" class="w-6 h-6 opacity-70"></i>
                    </a>
                    <span class="text-[12px] opacity-30 group-hover:opacity-100 tracking-[0.1em] font-bold uppercase truncate w-full text-center transition-opacity">${s.name}</span>
                </div>
            `}).join('');

            // 当前页未满，或当前页是最后一页（始终保留添加入口）
            const isLastPage = (page + 1) >= totalPages;
            if (pageItems.length < itemsPerPage || isLastPage) {
                html += `
                    <button onclick="openAddModal()" class="flex flex-col items-center gap-2 group">
                        <div class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center border-dashed border-white/10 hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-5 h-5 opacity-20 group-hover:opacity-50"></i>
                        </div>
                        <span class="text-[8px] opacity-10 tracking-[0.1em] uppercase font-bold text-center group-hover:opacity-30">Add</span>
                    </button>
                `;
            }

            grid.innerHTML = html;
            lucide.createIcons();
        }

        let editingIndex = -1;

        function populateBmGroupSelect(selectedId) {
            const sel = document.getElementById('bm-group');
            sel.innerHTML = groups.map(g =>
                `<option value="${g.id}"${g.id === selectedId ? ' selected' : ''}>${g.name}</option>`
            ).join('');
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('bm-modal-title').innerText = "添加快捷方式";
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = '';
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function editBookmark(index) {
            editingIndex = index;
            const bm = getCurrentBookmarks()[index];
            document.getElementById('bm-modal-title').innerText = "编辑快捷方式";
            document.getElementById('bm-name').value = bm.name;
            document.getElementById('bm-url').value = bm.url;
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function closeBookmarkModal() {
            toggleModal('bookmark-modal');
        }

        function saveBookmark() {
            const name = document.getElementById('bm-name').value.trim();
            const url = document.getElementById('bm-url').value.trim();
            const targetGroupId = document.getElementById('bm-group').value;
            if (!name || !url) return;
            const formattedUrl = url.startsWith('http') ? url : 'https://' + url;
            const targetGroup = groups.find(g => g.id === targetGroupId);
            if (!targetGroup) return;

            if (editingIndex > -1) {
                const srcBms = getCurrentBookmarks();
                const existing = srcBms[editingIndex];
                if (targetGroupId !== currentGroupId) {
                    // 跨分组移动：从源组删除，加入目标组
                    srcBms.splice(editingIndex, 1);
                    targetGroup.bookmarks.push({ ...existing, name, url: formattedUrl });
                    // 源组页码越界修正
                    const totalPages = getTotalPages(srcBms);
                    const page = getCurrentPage();
                    if (page >= totalPages && page > 0) setCurrentPage(page - 1);
                    currentGroupId = targetGroupId;
                } else {
                    srcBms[editingIndex] = { ...existing, name, url: formattedUrl };
                }
            } else {
                targetGroup.bookmarks.push({ name, url: formattedUrl, icon: 'globe' });
                if (targetGroupId !== currentGroupId) currentGroupId = targetGroupId;
            }

            saveGroups();
            renderGroupTabs();
            renderBookmarks();
            closeBookmarkModal();
        }

        function deleteBookmark(index) {
            const bms = getCurrentBookmarks();
            bms.splice(index, 1);
            saveGroups();
            const totalPages = getTotalPages(bms);
            const page = getCurrentPage();
            if (page >= totalPages && page > 0) setCurrentPage(page - 1);
            renderBookmarks();
        }

        function prevPage() {
            const page = getCurrentPage();
            if (page > 0) { setCurrentPage(page - 1); renderBookmarks(); }
        }

        function nextPage() {
            const page = getCurrentPage();
            const totalPages = getTotalPages(getCurrentBookmarks());
            if (page < totalPages - 1) { setCurrentPage(page + 1); renderBookmarks(); }
        }

        // ===== 分组标签栏 =====
        function renderGroupTabs() {
            const container = document.getElementById('group-tabs');
            let html = groups.map(g => {
                const active = g.id === currentGroupId ? ' active' : '';
                return `<button class="group-tab${active}" onclick="switchGroup('${g.id}')" oncontextmenu="showGroupCtxMenu(event,'${g.id}')" data-gid="${g.id}">${g.name}</button>`;
            }).join('');
            html += `<button onclick="openNewGroupModal()" class="ml-auto flex-shrink-0 opacity-30 hover:opacity-70 transition-opacity p-1 rounded-lg hover:bg-white/10" title="新建分组"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function switchGroup(id) {
            currentGroupId = id;
            renderGroupTabs();
            renderBookmarks();
        }

        // ===== 新建 / 重命名分组 =====
        let groupModalMode = 'create';
        let ctxGroupId = null;

        function openNewGroupModal() {
            groupModalMode = 'create';
            document.getElementById('group-modal-title').innerText = '新建分组';
            document.getElementById('group-name-input').value = '';
            toggleModal('group-name-modal');
            setTimeout(() => document.getElementById('group-name-input').focus(), 100);
        }

        function openRenameGroupModal() {
            hideGroupCtxMenu();
            groupModalMode = 'rename';
            document.getElementById('group-modal-title').innerText = '重命名分组';
            const g = groups.find(g => g.id === ctxGroupId);
            document.getElementById('group-name-input').value = g ? g.name : '';
            toggleModal('group-name-modal');
            setTimeout(() => document.getElementById('group-name-input').focus(), 100);
        }

        function confirmGroupName() {
            const name = document.getElementById('group-name-input').value.trim();
            if (!name) return;
            if (groupModalMode === 'create') {
                const id = 'group-' + Date.now();
                groups.push({ id, name, bookmarks: [] });
                saveGroups();
                switchGroup(id);
            } else {
                const g = groups.find(g => g.id === ctxGroupId);
                if (g) { g.name = name; saveGroups(); renderGroupTabs(); }
            }
            toggleModal('group-name-modal');
        }

        // ===== 右键 / 长按菜单 =====
        function showGroupCtxMenu(e, groupId, refEl) {
            if (e) e.preventDefault();
            ctxGroupId = groupId;
            const menu = document.getElementById('group-ctx-menu');
            const canDelete = groups.length > 1 && !isGroupProtected(groupId);
            document.getElementById('ctx-delete-btn').style.display = canDelete ? '' : 'none';
            menu.classList.remove('hidden');
            const x = e ? e.clientX : refEl.getBoundingClientRect().left;
            const y = e ? e.clientY : refEl.getBoundingClientRect().bottom + 4;
            menu.style.left = Math.min(x, window.innerWidth - 150) + 'px';
            menu.style.top = (y + 4) + 'px';
        }

        function hideGroupCtxMenu() {
            document.getElementById('group-ctx-menu').classList.add('hidden');
        }

        function confirmDeleteGroup() {
            hideGroupCtxMenu();
            if (groups.length <= 1 || isGroupProtected(ctxGroupId)) return;
            const grp = groups.find(g => g.id === ctxGroupId);
            if (!grp) return;

            document.getElementById('del-group-title').innerText = `删除「${grp.name}」`;
            const moveSection = document.getElementById('del-group-move-section');
            const targetSel = document.getElementById('del-group-target');

            if (grp.bookmarks.length > 0) {
                document.getElementById('del-group-msg').innerText =
                    `该分组内有 ${grp.bookmarks.length} 个书签，删除后无法恢复。可将书签保留到其他分组。`;
                targetSel.innerHTML = `<option value="">不保留书签</option>` +
                    groups.filter(g => g.id !== ctxGroupId)
                          .map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                moveSection.classList.remove('hidden');
            } else {
                document.getElementById('del-group-msg').innerText =
                    `确认删除分组「${grp.name}」？此操作不可撤销。`;
                moveSection.classList.add('hidden');
            }
            toggleModal('delete-group-modal');
        }

        function executeDeleteGroup() {
            const targetId = document.getElementById('del-group-target').value;
            const grp = groups.find(g => g.id === ctxGroupId);
            if (grp && targetId) {
                const targetGroup = groups.find(g => g.id === targetId);
                if (targetGroup) targetGroup.bookmarks.push(...grp.bookmarks);
            }
            groups = groups.filter(g => g.id !== ctxGroupId);
            delete groupPages[ctxGroupId];
            saveGroups(); savePages();
            if (currentGroupId === ctxGroupId) currentGroupId = groups[0].id;
            toggleModal('delete-group-modal');
            renderGroupTabs();
            renderBookmarks();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = todos.length ? todos.map((t, index) => `
                <div class="todo-item ${t.completed ? 'completed' : ''} flex items-center justify-between gap-4 group/item p-4 rounded-2xl hover:bg-white/5 transition-all">
                    <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="toggleTodo(${index})">
                        <div class="w-6 h-6 rounded-full border border-white/20 flex items-center justify-center transition-all ${t.completed ? 'bg-emerald-500 border-transparent shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'group-hover/item:border-white/50'}">
                            ${t.completed ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                        </div>
                        <span class="text-sm font-light tracking-wide transition-all ${t.completed ? 'opacity-30 line-through' : 'opacity-80'}">${t.text}</span>
                    </div>
                    <button onclick="deleteTodo(${index})" class="opacity-0 group-hover/item:opacity-40 hover:text-red-400 transition-all p-2">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('') : `
                <div class="h-full flex flex-col items-center justify-center opacity-10 py-12">
                    <i data-lucide="list-checks" class="w-12 h-12 mb-4"></i>
                    <p class="text-[10px] uppercase tracking-widest font-black">Empty List</p>
                </div>
            `;
            lucide.createIcons();
        }

        function addTodo() {
            toggleModal('todo-modal');
            setTimeout(() => document.getElementById('todo-input').focus(), 100);
        }

        function confirmAddTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if(text) {
                todos.push({ id: Date.now(), text, completed: false });
                localStorage.setItem('todos_v7', JSON.stringify(todos));
                renderTodos();
                input.value = '';
                toggleModal('todo-modal');
            }
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            localStorage.setItem('todos_v7', JSON.stringify(todos));
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            localStorage.setItem('todos_v7', JSON.stringify(todos));
            renderTodos();
        }

        const audioSources = {
            rain: 'https://www.soundjay.com/nature/sounds/rain-07.mp3',
            white: 'https://www.soundjay.com/misc/sounds/white-noise-01.mp3',
            soothing: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
        };

        function changeAudio(type) {
            const audio = document.getElementById('bg-audio');
            const btn = document.getElementById('audio-btn');
            const mainIcon = document.getElementById('audio-main-icon');

            if (type === 'none') {
                audio.pause();
                btn.classList.remove('bg-white/40');
                mainIcon.setAttribute('data-lucide', 'music');
            } else {
                audio.src = audioSources[type];
                audio.play();
                btn.classList.add('bg-white/40');
                
                // 根据类型切换图标
                const icons = { rain: 'cloud-rain', white: 'wind', soothing: 'coffee' };
                mainIcon.setAttribute('data-lucide', icons[type]);
            }
            lucide.createIcons();
        }

        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('time').innerText = `${h}:${m}`;
            document.getElementById('date').innerText = now.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000); 
        updateClock();

        async function fetchWeather() {
            try {
                // 使用浏览器地理位置，如果失败则回退到北京
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await res.json();
                    const weather = data.current_weather;
                    document.getElementById('weather-temp').innerText = `${Math.round(weather.temperature)}°C`;
                    document.getElementById('weather-desc').innerText = getWeatherDesc(weather.weathercode);
                }, () => {
                    // 回退方案
                    document.getElementById('weather-desc').innerText = "Location needed";
                });
            } catch (e) {
                console.error("Weather fetch failed");
            }
        }

        function getWeatherDesc(code) {
            const map = {
                0: 'Clear', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
                45: 'Fog', 48: 'Depositing Rime Fog', 51: 'Light Drizzle',
                61: 'Slight Rain', 71: 'Slight Snow', 95: 'Thunderstorm'
            };
            return map[code] || 'Cloudy';
        }
        fetchWeather();
        setInterval(fetchWeather, 1800000); // 每30分钟更新一次

        async function fetchHitokoto() {
            try {
                const response = await fetch('https://v1.hitokoto.cn');
                const data = await response.json();
                const textEl = document.getElementById('hitokoto');
                const fromEl = document.getElementById('hitokoto-from');
                
                textEl.innerText = data.hitokoto;
                fromEl.innerText = `— ${data.from_who || ''} 「${data.from}」`;
                
                textEl.style.opacity = "1";
                fromEl.style.opacity = "1";
            } catch (err) {
                console.error('Failed to fetch hitokoto:', err);
                document.getElementById('hitokoto-container').style.display = 'none';
            }
        }
        fetchHitokoto();

        let currentEngine = 'baidu';

        function toggleEngineDropdown(e) {
            e.stopPropagation();
            document.getElementById('engine-dropdown').classList.toggle('active');
        }

        function setSearchEngine(engine) {
            currentEngine = engine;
            const names = { baidu: 'Baidu', google: 'Google', bing: 'Bing' };
            document.getElementById('current-engine-name').innerText = names[engine];
            document.getElementById('engine-dropdown').classList.remove('active');
        }

        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', () => {
            document.getElementById('engine-dropdown').classList.remove('active');
        });

        function performSearch() {
            const q = document.getElementById('search-input').value.trim();
            if(!q) return;
            const urls = {
                baidu: `https://www.baidu.com/s?wd=${encodeURIComponent(q)}`,
                google: `https://www.google.com/search?q=${encodeURIComponent(q)}`,
                bing: `https://www.bing.com/search?q=${encodeURIComponent(q)}`
            };
            window.open(urls[currentEngine], '_blank');
        }


        function setActiveBgModeUI(mode) {
            const btnUrl = document.getElementById('bg-mode-url');
            const btnLocal = document.getElementById('bg-mode-local');
            const btnPresets = document.getElementById('bg-mode-presets');
            const paneUrl = document.getElementById('bg-pane-url');
            const paneLocal = document.getElementById('bg-pane-local');
            const panePresets = document.getElementById('bg-pane-presets');

            const activeCls = 'bg-white/15';
            btnUrl.classList.toggle(activeCls, mode === 'url');
            btnLocal.classList.toggle(activeCls, mode === 'local');
            btnPresets.classList.toggle(activeCls, mode === 'presets');
            
            paneUrl.classList.toggle('hidden', mode !== 'url');
            paneLocal.classList.toggle('hidden', mode !== 'local');
            panePresets.classList.toggle('hidden', mode !== 'presets');

            if(mode === 'presets') renderPresets();
        }

        const presetImages = [
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=1200',
            'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&q=80&w=1200',
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200',
            'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=1200',
            'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&q=80&w=1200',
            'https://images.unsplash.com/photo-1433086566291-f1a5c2463dcd?auto=format&fit=crop&q=80&w=1200'
        ];

        function renderPresets() {
            const grid = document.getElementById('presets-grid');
            grid.innerHTML = presetImages.map(url => `
                <div onclick="applyPresetBg('${url}')" class="aspect-video rounded-xl overflow-hidden cursor-pointer hover:ring-2 ring-white/50 transition-all bg-white/5">
                    <img src="${url}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        function applyPresetBg(url) {
            applyBgImageUrl(url);
            localStorage.setItem('workbench_bg_mode_v8', 'presets');
            localStorage.setItem('workbench_bg_preset_v8', url);
            toggleModal('settings-modal');
        }

        function setBgMode(mode) {
            localStorage.setItem('workbench_bg_mode_v8', mode);
            setActiveBgModeUI(mode);
            lucide.createIcons();
        }

        function applyBgImageUrl(url) {
            document.getElementById('bg-overlay').style.backgroundImage = `url('${url}')`;
        }

        function applyBgFromUrl() {
            const raw = (document.getElementById('bg-url').value || '').trim();
            if(!raw) return;
            const url = raw.startsWith('http') ? raw : `https://${raw}`;
            applyBgImageUrl(url);
            localStorage.setItem('workbench_bg_mode_v8', 'url');
            localStorage.setItem('workbench_bg_url_v8', url);
            toggleModal('settings-modal');
        }

        function applyBgFromLocal() {
            const input = document.getElementById('bg-file');
            const file = input.files && input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const dataUrl = reader.result;
                applyBgImageUrl(dataUrl);
                localStorage.setItem('workbench_bg_mode_v8', 'local');
                localStorage.setItem('workbench_bg_local_v8', dataUrl);
                toggleModal('settings-modal');
            };
            reader.readAsDataURL(file);
        }

        function toggleModal(id) { 
            document.getElementById(id).classList.toggle('active'); 
        }

        // 点击遮罩层关闭弹窗（点内容区域不关闭）
        ['donate-modal', 'bookmark-modal', 'todo-modal', 'settings-modal', 'group-name-modal', 'delete-group-modal'].forEach((id) => {
            const modal = document.getElementById(id);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) toggleModal(id);
            });
        });

        // 点击任意处关闭右键菜单
        document.addEventListener('click', (e) => {
            if (!document.getElementById('group-ctx-menu').contains(e.target)) hideGroupCtxMenu();
        });

        // 分组标签栏长按（移动端）— 容器委托，只绑定一次
        (function () {
            const container = document.getElementById('group-tabs');
            let touchTimer;
            container.addEventListener('touchstart', (e) => {
                const btn = e.target.closest('[data-gid]');
                if (!btn) return;
                touchTimer = setTimeout(() => showGroupCtxMenu(null, btn.dataset.gid, btn), 600);
            }, { passive: true });
            container.addEventListener('touchend', () => clearTimeout(touchTimer));
            container.addEventListener('touchmove', () => clearTimeout(touchTimer));
        })();

        // 分组名称输入框回车确认
        document.getElementById('group-name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') confirmGroupName();
        });

        const np = document.getElementById('notepad');
        np.innerHTML = localStorage.getItem('notes_v7_rich') || '';
        np.oninput = () => localStorage.setItem('notes_v7_rich', np.innerHTML);

        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            np.focus();
        }

        function switchTab(tab) {
            const isNote = tab === 'note';
            document.getElementById('pane-note').classList.toggle('hidden', !isNote);
            document.getElementById('pane-todo').classList.toggle('hidden', isNote);
            document.getElementById('todo-add-btn').classList.toggle('hidden', isNote);
            document.getElementById('tab-note').style.opacity = isNote ? '1' : '0.3';
            document.getElementById('tab-todo').style.opacity = isNote ? '0.3' : '1';
        }

        // 宠物交互
        const petEmojis = ['🐱', '😸', '😹', '😴', '😋', '🧐'];
        const pet = document.getElementById('pet');
        pet.onclick = () => {
            pet.innerText = petEmojis[Math.floor(Math.random() * petEmojis.length)];
            pet.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => pet.style.transform = 'scale(1) rotate(0deg)', 200);
            const statuses = ["Meow!", "Purrr...", "Did you finish your work?", "I'm hungry!", "So happy!"];
            document.getElementById('pet-status').innerText = statuses[Math.floor(Math.random() * statuses.length)];
        };

        window.onload = () => {
            renderGroupTabs();
            renderBookmarks();
            renderTodos();
            const mode = localStorage.getItem('workbench_bg_mode_v8') || 'url';
            setActiveBgModeUI(mode);

            const savedUrl = localStorage.getItem('workbench_bg_url_v8');
            if(savedUrl) document.getElementById('bg-url').value = savedUrl;

            if(mode === 'local') {
                const savedLocal = localStorage.getItem('workbench_bg_local_v8');
                if(savedLocal) applyBgImageUrl(savedLocal);
            } else if (mode === 'presets') {
                const savedPreset = localStorage.getItem('workbench_bg_preset_v8');
                if(savedPreset) applyBgImageUrl(savedPreset);
            } else {
                if(savedUrl) applyBgImageUrl(savedUrl);
            }
        };
    </script>
</body>
</html>
