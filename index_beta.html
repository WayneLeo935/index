<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayu Tab</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库；固定到 0.294.0，新版本移除了 github 等品牌图标 -->
    <script src="https://unpkg.com/lucide@0.294.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #000;
            width: 100vw;
            height: 100vh;
        }

        /* 极致毛玻璃效果 - 增加了饱和度和模糊度，更有苹果味 */
        /* 毛玻璃效果：blur 半径与面板 gap 的关系决定了兄弟采样污染程度。
           blur 35px + gap 32px 时，相邻面板会被采样到边缘 → hover 重绘时出现"白/蓝框"伪影。
           选择 blur 20px（< gap 32px），物理上切断跨面板采样。 */
        .apple-glass {
            --glass-tint: rgba(255, 255, 255, 0.12);
            --glass-edge: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
            isolation: isolate;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow:
                0 15px 50px -10px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        .apple-glass::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02) 28%, rgba(255, 255, 255, 0.01) 100%), var(--glass-tint);
            pointer-events: none;
            z-index: 0;
        }
        .apple-glass::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 0;
            box-shadow: inset 0 0 0 1px var(--glass-edge);
            background: radial-gradient(120% 90% at 50% 0%, var(--glass-highlight) 0%, rgba(255, 255, 255, 0.05) 26%, rgba(255, 255, 255, 0) 58%);
            opacity: 0.9;
        }
        .apple-glass > * {
            position: relative;
            z-index: 1;
        }
        /* 外层分组做 stacking context 隔离顶栏与面板区 */
        .glass-group {
            isolation: isolate;
            position: relative;
        }
        /* 下拉淡入时让 transform 常驻 GPU 合成层，subpixel 位置不 snap → 消除过渡结束瞬间第一行文字的跳动。
           选择器匹配所有带 opacity-0 类的 apple-glass（即顶栏下拉），不影响主面板。
           只用 transform，不用 backdrop-filter，避免断开 backdrop 采样。 */
        .apple-glass[class*="opacity-0"] {
            will-change: transform;
        }

        /* 背景层 */
        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2560');
            background-size: cover; 
            background-position: center;
            z-index: -2; 
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            align-items: center; justify-content: center; z-index: 100;
            pointer-events: none; /* 允许穿透空白区域点击 */
        }
        /* 激活时整个遮罩做全屏模糊：页面背景通过遮罩的 backdrop-filter 统一模糊，
           里层 .apple-glass 面板不再自己采样 → 无跨采样虚影、无图片重绘双曝光。 */
        .modal.active {
            display: flex;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
        }
        .modal > * { pointer-events: auto; }
        /* 模态内的面板不再做 backdrop-filter（整个遮罩已经模糊背景），
           用半透明白玻璃卡片，完全不参与 backdrop 采样。 */
        .modal .apple-glass {
            --glass-tint: rgba(255, 255, 255, 0.06);
            --glass-edge: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow:
                0 15px 50px -10px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* Modal 右上角关闭按钮统一样式：
           z-index: 2 用来盖过 `.apple-glass > * { z-index: 1 }` 给 h3 等兄弟赋的层级，
           避免 h3 作为后续 DOM 元素在同层级上抢走点击事件。 */
        .modal-close {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            z-index: 2;
            width: 1.5rem;
            height: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.2s ease;
        }
        .modal-close:hover { opacity: 1; }
        .modal-close .lucide { width: 1.5rem; height: 1.5rem; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .hover-lift { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-8px); filter: brightness(1.2); }

        /* 番茄钟时长按钮 */
        .pomo-dur-btn { opacity: 0.5; }
        .pomo-dur-btn.active { opacity: 1; background: rgba(255,255,255,0.15); }

        /* 宠物 PNG 容器 */
        .pet-wrap { width: 120px; height: 120px; display: inline-block; cursor: pointer; user-select: none; position: relative; --flip: 1; }
        .pet-img { width: 100%; height: 100%; display: block; pointer-events: none; user-select: none; opacity: 1; transition: opacity 0.08s ease; background: transparent; -webkit-user-drag: none; object-fit: contain; transform: scaleX(var(--flip)); }
        .pet-wrap.facing-left { --flip: -1; }

        /* 各状态 keyframe 动画 —— 动画里复用 scaleX(var(--flip)) 以同时兼容镜像 */
        @keyframes petStateIdle {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            50% { transform: translateY(-4px) scaleX(var(--flip)); }
        }
        @keyframes petStateHappy {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            50% { transform: translateY(-8px) scaleX(var(--flip)); }
        }
        @keyframes petStateCelebrate {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            40% { transform: translateY(-16px) scaleX(var(--flip)); }
            60% { transform: translateY(-12px) scaleX(var(--flip)); }
        }
        @keyframes petStateSad {
            0%, 100% { transform: translateX(0) scaleX(var(--flip)); }
            25% { transform: translateX(-2px) scaleX(var(--flip)); }
            75% { transform: translateX(2px) scaleX(var(--flip)); }
        }
        @keyframes petStateSleeping {
            /* 呼吸感：scale 0.97 ↔ 1.0，周期 4s */
            0%, 100% { transform: scale(1) scaleX(var(--flip)); }
            50% { transform: scale(0.97) scaleX(var(--flip)); }
        }
        @keyframes petWakeShake {
            0%, 100% { transform: translateX(0)   scaleX(var(--flip)); }
            20%      { transform: translateX(-4px) scaleX(var(--flip)); }
            40%      { transform: translateX( 4px) scaleX(var(--flip)); }
            60%      { transform: translateX(-4px) scaleX(var(--flip)); }
            80%      { transform: translateX( 4px) scaleX(var(--flip)); }
        }
        @keyframes petWakePop {
            0%   { transform: scale(0.8) scaleX(var(--flip)); }
            60%  { transform: scale(1.1) scaleX(var(--flip)); }
            100% { transform: scale(1)   scaleX(var(--flip)); }
        }
        .pet-wrap.state-idle      .pet-img { animation: petStateIdle 3s ease-in-out infinite; }
        .pet-wrap.state-happy     .pet-img { animation: petStateHappy 0.5s ease-in-out 2; }
        .pet-wrap.state-celebrate .pet-img { animation: petStateCelebrate 0.5s ease-in-out 3; }
        .pet-wrap.state-sad       .pet-img { animation: petStateSad 4s ease-in-out infinite; }
        .pet-wrap.state-sleeping  .pet-img { animation: petStateSleeping 4s ease-in-out infinite; }
        .pet-wrap.state-yawning   .pet-img { animation: petStateIdle 3s ease-in-out infinite; }
        .pet-wrap.waking-shake    .pet-img { animation: petWakeShake 0.3s ease-in-out !important; }
        .pet-wrap.waking-pop      .pet-img { animation: petWakePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) !important; }
        /* dragged 状态无 keyframe —— 位置由 JS pointermove 设置 left/top 直接跟随光标 */

        /* 投喂食物图标 */
        .pet-food { position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%); width: 18px; height: 18px; opacity: 0; pointer-events: none; z-index: 4; }
        .pet-food.show { animation: petFoodPop 1.5s ease-out forwards; }
        @keyframes petFoodPop {
            0% { opacity: 0; transform: translate(-50%, 8px) scale(0.6); }
            20% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -2px) scale(0.95); }
            100% { opacity: 0; transform: translate(-50%, -10px) scale(0.4); }
        }

        /* 拖拽 */
        .pet-wrap.dragging { transition: none !important; cursor: grabbing; z-index: 9999; }
        /* 用 absolute 而非 fixed，避免被祖先 backdrop-filter / transform 劫持为包含块导致拖拽时定位错乱 */
        .pet-wrap.pinned { position: absolute !important; z-index: 9998; }
        .pet-wrap { transition: left 4.8s cubic-bezier(0.45, 0, 0.25, 1), top 4.8s cubic-bezier(0.45, 0, 0.25, 1), opacity 0.25s ease; }
        .pet-onboard-card.selected { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
        .pet-onboard-svg img { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* 心情指示条 */
        .pet-mood { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 5; }
        .pet-mood.show { opacity: 1; }
        .pet-mood .mood-heart { width: 12px; height: 12px; color: #f472b6; }
        .pet-mood .mood-heart.empty { color: rgba(244, 114, 182, 0.25); }
        /* 名字：宠物下方 */
        .pet-name {
            position: absolute; top: 104px; left: 50%; transform: translateX(-50%);
            font-size: 17px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.92);
            text-shadow: 0 1px 3px rgba(0,0,0,0.45);
            white-space: nowrap; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 5;
        }
        .pet-name.show { opacity: 1; }

        /* 心情指示装饰（星星 / 乌云） */
        .pet-mood-fx { position: absolute; left: 50%; top: -6px; transform: translateX(-50%); pointer-events: none; opacity: 0; transition: opacity 0.8s ease; z-index: 4; width: 80px; height: 40px; }
        .pet-mood-fx.show { opacity: 1; }
        .pet-mood-fx .fx-star { position: absolute; width: 12px; height: 12px; color: #fde68a; opacity: 0; animation: fxStar 2.4s ease-in-out infinite; }
        .pet-mood-fx .fx-star:nth-child(1) { left: 8px;  top: 8px;  animation-delay: 0s; }
        .pet-mood-fx .fx-star:nth-child(2) { left: 34px; top: 0px;  animation-delay: 0.7s; }
        .pet-mood-fx .fx-star:nth-child(3) { left: 60px; top: 10px; animation-delay: 1.4s; }
        @keyframes fxStar {
            0% { opacity: 0; transform: scale(0.4) translateY(4px); }
            30% { opacity: 1; transform: scale(1) translateY(-2px); }
            70% { opacity: 1; transform: scale(1) translateY(-6px); }
            100% { opacity: 0; transform: scale(0.6) translateY(-12px); }
        }
        .pet-mood-fx .fx-cloud { position: absolute; left: 50%; top: 4px; transform: translateX(-50%); width: 36px; height: 22px; color: rgba(180, 200, 220, 0.85); animation: fxCloudFloat 4.5s ease-in-out infinite; }
        @keyframes fxCloudFloat {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-46%) translateY(-3px); }
        }
        .pet-mood-fx .fx-drop { position: absolute; top: 22px; width: 3px; height: 6px; border-radius: 2px; background: rgba(140, 170, 200, 0.85); opacity: 0; animation: fxDrop 1.6s ease-in infinite; }
        .pet-mood-fx .fx-drop:nth-child(2) { left: calc(50% - 8px); animation-delay: 0s; }
        .pet-mood-fx .fx-drop:nth-child(3) { left: calc(50% + 0px); animation-delay: 0.5s; }
        .pet-mood-fx .fx-drop:nth-child(4) { left: calc(50% + 8px); animation-delay: 1.0s; }
        @keyframes fxDrop {
            0% { opacity: 0; transform: translateY(0); }
            25% { opacity: 1; }
            100% { opacity: 0; transform: translateY(14px); }
        }

        /* 睡眠 Z 指示 */
        .pet-zz { position: absolute; top: -8px; right: 8px; font-size: 14px; font-weight: 700; color: rgba(180,200,220,0.85); opacity: 0; transition: opacity 0.6s ease; pointer-events: none; z-index: 4; letter-spacing: 1px; }
        .pet-zz.show { opacity: 1; animation: zzFloat 2.4s ease-in-out infinite; }
        @keyframes zzFloat {
            0% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(-6px); opacity: 1; }
            100% { transform: translateY(-12px); opacity: 0; }
        }

        /* 富文本工具栏 */
        .toolbar-btn {
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            opacity: 0.5;
        }
        .toolbar-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
        .toolbar-btn.active {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
        }
        .rich-editor {
            flex: 1;
            outline: none;
            overflow-y: auto;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        /* 分组标签栏 */
        .group-tab {
            padding: 0.4rem 0.9rem;
            border-radius: 0.5rem;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .group-tab:hover { opacity: 0.65; background: rgba(255,255,255,0.08); }
        .group-tab.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .group-tab.bm-drop-target {
            opacity: 1;
            background: rgba(255,255,255,0.22);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
        }
        .group-tab[contenteditable="true"] {
            outline: none;
            user-select: text;
            background: rgba(255,255,255,0.12);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
        }
        .rich-editor:empty:before {
            content: attr(placeholder);
            opacity: 0.2;
        }
        /* 任务长按完成 —— 涨水动画 */
        .todo-check { touch-action: none; }
        .todo-check-fill {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 0%;
            background: rgba(16, 185, 129, 0.75);
            pointer-events: none;
            transition: height 0s;
        }
        .todo-check.holding .todo-check-fill {
            height: 100%;
            transition: height 1.5s linear;
        }
        /* 已完成状态：水位默认 100%，按住时缓慢下降 */
        .todo-check.done .todo-check-fill {
            height: 100%;
            background: rgb(16, 185, 129);
        }
        .todo-check.done.holding .todo-check-fill {
            height: 0%;
            transition: height 1.5s linear;
        }
        /* 书签拖拽插入指示线 */
        .bookmark-tile { position: relative; }
        .bookmark-tile.bm-drop-before::before,
        .bookmark-tile.bm-drop-after::after {
            content: '';
            position: absolute;
            top: 8px;
            bottom: 28px;
            width: 2px;
            background: rgba(255,255,255,0.55);
            border-radius: 1px;
            pointer-events: none;
        }
        .bookmark-tile.bm-drop-before::before { left: -4px; }
        .bookmark-tile.bm-drop-after::after   { right: -4px; }

        /* 页面载入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.02); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0px); }
        }
        .animate-page { animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        /* 搜索框美化 */
        .search-container {
            position: relative;
        }
        /* 与 engine-dropdown 同款：复刻 v3 实际视觉（12% 白底 + inset 白边 + drop shadow），
           去掉 backdrop-filter 避免跨元素采样产生真实模糊/虚影，也避免 fade-in 首帧白闪。 */
        .light-dropdown {
            background-color: rgba(255, 255, 255, 0.12);
            background-clip: padding-box;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 15px 50px -10px rgba(0, 0, 0, 0.4);
        }
        .light-dropdown .src-item:hover,
        .light-dropdown button:hover { background: rgba(255, 255, 255, 0.1); }

        /* 点击触发的格言来源下拉 */
        #hitokoto-src-dropdown.open { opacity: 1; visibility: visible; }

        /* 首次加载高亮呼吸：未初始化宠物时提示用户点击 */
        @keyframes petNavBreath {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.55), inset 0 0 0 1px rgba(255, 255, 255, 0.35); transform: scale(1); }
            50%      { box-shadow: 0 0 18px 6px rgba(255, 255, 255, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.6); transform: scale(1.06); }
        }
        #pet-nav-btn.breath { animation: petNavBreath 2.2s ease-in-out infinite; }
        /* 初始化菜单项呼吸：下拉打开后引导用户完成初始化 */
        @keyframes petNavInitBreath {
            0%, 100% { background: rgba(255, 255, 255, 0); }
            50%      { background: rgba(255, 255, 255, 0.14); }
        }
        #pet-nav-init-btn.breath { animation: petNavInitBreath 2.2s ease-in-out infinite; }
        /* hover 右上角宠物导航时，气泡淡出让位下拉菜单，移出后恢复 */
        #pet-hint { transition: opacity 0.25s ease, transform 0.25s ease; }
        body:has(#pet-nav-wrap:hover) #pet-hint {
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
        }
        /* 顶栏：关掉 glass-group 的 stacking isolation，让每个 button-wrap 的 hover z-50 能升到 main-container 上层 */
        #top-nav-buttons { isolation: auto; }
        /* 菜单里的开关样式：同色调毛玻璃，保持极简 */
        .pet-nav-switch {
            position: relative; display: inline-block; width: 32px; height: 18px;
            background: rgba(255, 255, 255, 0.12); border-radius: 999px;
            transition: background 0.2s ease;
        }
        .pet-nav-switch-dot {
            position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
            background: rgba(255, 255, 255, 0.85); border-radius: 50%;
            transition: left 0.2s ease, background 0.2s ease;
        }
        .pet-nav-switch.on { background: rgba(255, 255, 255, 0.32); }
        .pet-nav-switch.on .pet-nav-switch-dot { left: 16px; background: #fff; }

        /* 复刻 v3 视觉：
           v3 里 dropdown 嵌套在 apple-glass 搜索条内（搜索条是 backdrop root），
           内层 backdrop-filter 被父 root 截断，视觉上只有 12% 白底 + 边框在起作用。
           v5 重构后 dropdown 是搜索条同级，如果保留 backdrop-filter 就会真实采样页面 → 出现真实模糊 + 跨元素虚影。
           所以这里直接去掉 backdrop-filter，只保留 v3 实际呈现出来的那层效果。 */
        .engine-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0.5rem;
            margin-bottom: 0.75rem;
            width: 10rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 60;
            background-color: rgba(255, 255, 255, 0.12);
            background-clip: padding-box;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 15px 50px -10px rgba(0, 0, 0, 0.4);
        }
        .engine-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .engine-option {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1.5rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: background 0.2s;
        }
        .engine-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 统一输入框与按钮样式 */
        input, select, textarea {
            transition: all 0.3s ease;
        }
        
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 自定义 Todo 输入框样式 */
        .todo-input-group {
            display: flex;

        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ===== 作者配置 =====
        const AUTHOR_CONFIG = {
            name: '作者主页',
            links: [
                { label: '阿宇不画图-小红书', icon: 'heart', url: 'https://xhslink.com/m/4PoZVQp09DM' },
            ]
        };
        // Formsubmit hash endpoint：已激活，邮箱对应 wayneleo11@gmail.com 但对外隐藏
        const FEEDBACK_ENDPOINT = 'https://formsubmit.co/ajax/cdbb253d6a3294a6f24fe41f1b62c0e9';

        lucide.createIcons();

        // 等比缩放：始终以 1920×1080 为基准适配实际视口
        function scaleLayout() {
            const el = document.getElementById('main-container');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            el.style.transform = 'scale(' + scale + ')';
        }
        scaleLayout();
        window.addEventListener('resize', scaleLayout);

        // --- 快捷方式分组数据 ---
        function loadGroups() {
            const saved = localStorage.getItem('shortcuts.groups');
            if (saved) {
                try { return JSON.parse(saved); } catch(e) { console.warn('[shortcuts] groups parse failed, falling back', e); }
            }

            // 从旧格式迁移，保留数据不丢失
            const old = localStorage.getItem('bookmarks_v7');
            if (old) {
                try {
                    const migrated = [{ id: 'group-default', name: '默认', bookmarks: JSON.parse(old) }];
                    localStorage.setItem('shortcuts.groups', JSON.stringify(migrated));
                    return migrated;
                } catch(e) { console.warn('[shortcuts] legacy migration parse failed, using defaults', e); }
            }

            // 首次默认分组
            return [
                {
                    id: 'group-work',
                    name: '工作',
                    bookmarks: [
                        { name: 'Github', url: 'https://github.com', icon: 'github' },
                        { name: 'ArchDaily', url: 'https://archdaily.com', icon: 'layout' },
                        { name: 'Pinterest', url: 'https://pinterest.com', icon: 'image' }
                    ]
                },
                {
                    id: 'group-fun',
                    name: '娱乐',
                    bookmarks: [
                        { name: 'Bilibili', url: 'https://bilibili.com', icon: 'tv' }
                    ]
                }
            ];
        }

        function saveGroups() {
            localStorage.setItem('shortcuts.groups', JSON.stringify(groups));
        }

        // ===== 浏览器书签导入（Netscape Bookmark File Format） =====
        // Chrome / Firefox / Safari / Edge 导出的 .html 都是这个格式：<DT><H3>folder</H3><DL><DT><A HREF>link</A></DL>
        function parseNetscapeBookmarks(htmlText) {
            const doc = new DOMParser().parseFromString(htmlText, 'text/html');
            // 根 DL 可能有多个 <DT>，每个 DT 是文件夹 (H3+DL) 或单书签 (A)
            // 递归扁平化：我们只取顶层文件夹作为 group，深层嵌套的书签合并到所属顶层组
            function collectLinks(dl) {
                const links = [];
                dl.querySelectorAll(':scope > dt > a').forEach(a => {
                    links.push({
                        name: (a.textContent || a.getAttribute('href') || '').trim().slice(0, 120),
                        url: a.getAttribute('href') || '',
                        iconUrl: a.getAttribute('icon') || null
                    });
                });
                // 深层嵌套子文件夹里的书签也拍平进来
                dl.querySelectorAll(':scope > dt > dl').forEach(sub => {
                    links.push(...collectLinks(sub));
                });
                return links.filter(b => /^https?:\/\//i.test(b.url));
            }
            const result = [];
            const rootDl = doc.querySelector('dl');
            if (!rootDl) return result;
            // 顶层 DL 的每个 DT：若内含 H3 视为文件夹，否则直接书签归到"未分组"
            const loose = [];
            rootDl.querySelectorAll(':scope > dt').forEach(dt => {
                const h3 = dt.querySelector(':scope > h3');
                if (h3) {
                    const name = (h3.textContent || '书签').trim().slice(0, 40);
                    const subDl = dt.querySelector(':scope > dl');
                    const links = subDl ? collectLinks(subDl) : [];
                    if (links.length) result.push({ name, bookmarks: links });
                } else {
                    const a = dt.querySelector(':scope > a');
                    if (a && /^https?:\/\//i.test(a.getAttribute('href') || '')) {
                        loose.push({
                            name: (a.textContent || '').trim().slice(0, 120),
                            url: a.getAttribute('href'),
                            iconUrl: a.getAttribute('icon') || null
                        });
                    }
                }
            });
            if (loose.length) result.unshift({ name: '未分组', bookmarks: loose });
            return result;
        }

        // 导出为 Netscape Bookmark File Format（Chrome/Firefox/Safari 均可导入）
        function exportBookmarks() {
            const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            const now = Math.floor(Date.now() / 1000);
            let body = '';
            groups.forEach(g => {
                body += `    <DT><H3 ADD_DATE="${now}" LAST_MODIFIED="${now}">${esc(g.name)}</H3>\n    <DL><p>\n`;
                (g.bookmarks || []).forEach(b => {
                    if (!b || !b.url) return;
                    const iconAttr = b.iconUrl ? ` ICON="${esc(b.iconUrl)}"` : '';
                    body += `        <DT><A HREF="${esc(b.url)}" ADD_DATE="${now}"${iconAttr}>${esc(b.name || b.url)}</A>\n`;
                });
                body += '    </DL><p>\n';
            });
            const html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
<TITLE>Bookmarks</TITLE>
<H1>Bookmarks</H1>
<DL><p>
${body}</DL><p>
`;
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const stamp = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `ayu-bookmarks-${stamp}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function onBookmarkFilePicked(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const parsed = parseNetscapeBookmarks(String(ev.target.result || ''));
                    if (!parsed.length) { alert('没有解析到任何书签。请检查文件是否为浏览器导出的 HTML。'); return; }
                    const count = parsed.reduce((n, g) => n + g.bookmarks.length, 0);
                    const ok = confirm(`解析到 ${parsed.length} 个分组，共 ${count} 条书签。\n\n【确定】追加到现有分组（新建组）\n【取消】放弃导入`);
                    if (!ok) return;
                    // 追加为新分组，避免覆盖既有数据
                    parsed.forEach(g => {
                        groups.push({
                            id: 'group-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
                            name: g.name,
                            bookmarks: g.bookmarks
                        });
                    });
                    saveGroups();
                    renderGroupTabs();
                    calcAndRenderBookmarks();
                } catch (err) {
                    console.error(err);
                    alert('解析失败：' + err.message);
                } finally {
                    e.target.value = ''; // 允许同一文件再次选择
                }
            };
            reader.readAsText(file, 'utf-8');
        }

        function getCurrentBookmarks() {
            const g = groups.find(g => g.id === currentGroupId);
            return g ? g.bookmarks : (groups[0]?.bookmarks || []);
        }

        let groups = loadGroups();
        let currentGroupId = groups[0]?.id || null;

        // 所有分组均可删除（只要不是最后一个）

        // ===== 待办系统 =====
        const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

        function migrateTodos() {
            const saved = localStorage.getItem('todos.active');
            if (saved) { try { return JSON.parse(saved); } catch(e) {} }
            let old = null;
            try { old = JSON.parse(localStorage.getItem('todos_v7') || 'null'); }
            catch(e) { console.warn('[todos] legacy parse failed, skipping migration', e); }
            if (old && Array.isArray(old)) {
                return old.map(t => ({
                    id: 'td-' + (t.id || Date.now()),
                    text: t.text || '',
                    completed: !!t.completed,
                    priority: 'medium',
                    dueDate: null,
                    createdAt: typeof t.id === 'number' ? t.id : Date.now(),
                    completedAt: t.completed ? Date.now() : null
                }));
            }
            return [{ id: 'td-default', text: '开始设计第一稿', completed: false, priority: 'medium', dueDate: null, createdAt: Date.now(), completedAt: null }];
        }

        let todos = migrateTodos();
        let todoManualOrder = (() => {
            try { return JSON.parse(localStorage.getItem('todos.manualOrder') || 'false'); }
            catch(e) { return false; }
        })();
        let completedSectionOpen = false;
        let currentTodoPriority = 'medium';
        let todoDragSrcId = null;

        // 书签网格：动态列数，每页 2 行；每页填满 cols * 2 个书签后翻下一页
        let currentCols = 4;
        let currentItemsPerPage = 8; // 初始值对应 4 列

        function getTotalPages(bms) {
            // +1 为「添加」按钮预留位置：若当前总数正好填满整数页，再多出一页用于添加
            return Math.max(1, Math.ceil((bms.length + 1) / currentItemsPerPage));
        }

        // 每个分组独立记忆当前页，存入 localStorage
        let groupPages = (() => {
            try { return JSON.parse(localStorage.getItem('shortcuts.pages')) || {}; }
            catch(e) { console.warn('[shortcuts] pages parse failed, resetting', e); return {}; }
        })();
        function savePages() { localStorage.setItem('shortcuts.pages', JSON.stringify(groupPages)); }
        function getCurrentPage() { return groupPages[currentGroupId] || 0; }
        function setCurrentPage(n) { groupPages[currentGroupId] = n; savePages(); }

        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');
            grid.style.gridTemplateColumns = `repeat(${currentCols}, 1fr)`;
            const page = getCurrentPage();
            const start = page * currentItemsPerPage;
            const end = start + currentItemsPerPage;
            const bms = getCurrentBookmarks();
            const pageItems = bms.slice(start, end);

            const totalPages = getTotalPages(bms);
            document.getElementById('page-indicator').innerText = `${page + 1}/${totalPages}`;

            let html = pageItems.map((s, index) => {
                const globalIndex = start + index;
                return `
                <div class="bookmark-tile flex flex-col items-center gap-2 group relative" data-bm-idx="${globalIndex}"
                     draggable="true"
                     ondragstart="onBmDragStart(event, ${globalIndex})"
                     ondragover="onBmDragOver(event, ${globalIndex})"
                     ondragleave="onBmDragLeave(event)"
                     ondrop="onBmDrop(event, ${globalIndex})"
                     ondragend="onBmDragEnd()">
                    <div class="absolute -top-2 -right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all z-10">
                        <button onclick="editBookmark(${globalIndex})" class="bg-white/20 backdrop-blur-md rounded-full p-1.5 hover:bg-white/40"><i data-lucide="edit-2" class="w-3 h-3"></i></button>
                        <button onclick="deleteBookmark(${globalIndex})" class="bg-red-500/60 backdrop-blur-md rounded-full p-1.5 hover:bg-red-600/80"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>
                    <a href="${s.url}" target="_blank" draggable="false" class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center hover-lift group-hover:bg-white/30 shadow-sm">
                        ${s.iconUrl
                            ? `<img src="${s.iconUrl}" alt="" class="w-6 h-6 rounded-sm" draggable="false">`
                            : `<i data-lucide="${s.icon || 'link-2'}" class="w-6 h-6 opacity-70"></i>`}
                    </a>
                    <span class="text-[12px] opacity-30 group-hover:opacity-100 tracking-[0.1em] font-bold uppercase truncate w-full text-center transition-opacity">${s.name}</span>
                </div>
            `}).join('');

            // 当前页未满，或当前页是最后一页（始终保留添加入口）
            const isLastPage = (page + 1) >= totalPages;
            if (pageItems.length < currentItemsPerPage || isLastPage) {
                html += `
                    <button onclick="openAddModal()" class="flex flex-col items-center gap-2 group">
                        <div class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center border-dashed border-white/10 hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-5 h-5 opacity-20 group-hover:opacity-50"></i>
                        </div>
                    </button>
                `;
            }

            grid.innerHTML = html;
            lucide.createIcons();
        }

        // 根据快捷方式面板宽度动态计算列数与每页数，宽度变化时重置到第一页
        function calcAndRenderBookmarks() {
            const panel = document.getElementById('panel-shortcuts');
            if (!panel || panel.classList.contains('hidden')) return;
            const wrapper = document.getElementById('bookmarks-grid-wrapper');
            if (!wrapper) return;
            const availableWidth = wrapper.clientWidth;
            const newCols = Math.max(1, Math.floor(availableWidth / 100));
            const newPerPage = newCols * 2;
            if (newCols !== currentCols || newPerPage !== currentItemsPerPage) {
                currentCols = newCols;
                currentItemsPerPage = newPerPage;
                setCurrentPage(0);
            }
            renderBookmarks();
        }

        let editingIndex = -1;

        function populateBmGroupSelect(selectedId) {
            const sel = document.getElementById('bm-group');
            sel.innerHTML = groups.map(g =>
                `<option value="${g.id}"${g.id === selectedId ? ' selected' : ''}>${g.name}</option>`
            ).join('');
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('bm-modal-title').innerText = "添加快捷方式";
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = '';
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function editBookmark(index) {
            editingIndex = index;
            const bm = getCurrentBookmarks()[index];
            document.getElementById('bm-modal-title').innerText = "编辑快捷方式";
            document.getElementById('bm-name').value = bm.name;
            document.getElementById('bm-url').value = bm.url;
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function closeBookmarkModal() {
            toggleModal('bookmark-modal');
        }

        function saveBookmark() {
            const name = document.getElementById('bm-name').value.trim();
            const url = document.getElementById('bm-url').value.trim();
            const targetGroupId = document.getElementById('bm-group').value;
            if (!name || !url) return;
            const formattedUrl = url.startsWith('http') ? url : 'https://' + url;
            const targetGroup = groups.find(g => g.id === targetGroupId);
            if (!targetGroup) return;

            if (editingIndex > -1) {
                const srcBms = getCurrentBookmarks();
                const existing = srcBms[editingIndex];
                if (targetGroupId !== currentGroupId) {
                    // 跨分组移动：从源组删除，加入目标组
                    srcBms.splice(editingIndex, 1);
                    targetGroup.bookmarks.push({ ...existing, name, url: formattedUrl });
                    // 源组页码越界修正
                    const totalPages = getTotalPages(srcBms);
                    const page = getCurrentPage();
                    if (page >= totalPages && page > 0) setCurrentPage(page - 1);
                    currentGroupId = targetGroupId;
                } else {
                    srcBms[editingIndex] = { ...existing, name, url: formattedUrl };
                }
            } else {
                targetGroup.bookmarks.push({ name, url: formattedUrl, icon: 'globe' });
                if (targetGroupId !== currentGroupId) currentGroupId = targetGroupId;
            }

            saveGroups();
            renderGroupTabs();
            renderBookmarks();
            closeBookmarkModal();
        }

        function deleteBookmark(index) {
            const bms = getCurrentBookmarks();
            bms.splice(index, 1);
            saveGroups();
            const totalPages = getTotalPages(bms);
            const page = getCurrentPage();
            if (page >= totalPages && page > 0) setCurrentPage(page - 1);
            renderBookmarks();
        }

        // ===== 书签拖拽排序 =====
        let bmDragSrcIdx = -1;
        let bmDragSrcGroupId = null;
        const _bmEmptyDragImg = (() => {
            const img = new Image();
            img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            return img;
        })();
        function onBmDragStart(e, idx) {
            bmDragSrcIdx = idx;
            bmDragSrcGroupId = currentGroupId;
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', String(idx)); } catch(_) {}
            try { e.dataTransfer.setDragImage(_bmEmptyDragImg, 0, 0); } catch(_) {}
            setTimeout(() => {
                const el = document.querySelector(`.bookmark-tile[data-bm-idx="${idx}"]`);
                if (el) el.style.opacity = '0.3';
            }, 0);
        }
        function onBmDragOver(e, idx) {
            e.preventDefault();
            if (idx === bmDragSrcIdx || bmDragSrcIdx < 0) return;
            document.querySelectorAll('.bookmark-tile').forEach(el => el.classList.remove('bm-drop-before','bm-drop-after'));
            const el = document.querySelector(`.bookmark-tile[data-bm-idx="${idx}"]`);
            if (el) {
                const mid = el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2;
                el.classList.add(e.clientX < mid ? 'bm-drop-before' : 'bm-drop-after');
            }
        }
        function onBmDragLeave(e) { /* 由 dragover 的清除处理 */ }
        function onBmDrop(e, targetIdx) {
            e.preventDefault();
            if (bmDragSrcIdx < 0 || bmDragSrcIdx === targetIdx) return;
            const bms = getCurrentBookmarks();
            if (bmDragSrcIdx >= bms.length || targetIdx >= bms.length) return;
            const el = document.querySelector(`.bookmark-tile[data-bm-idx="${targetIdx}"]`);
            let before = true;
            if (el) {
                const mid = el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2;
                before = e.clientX < mid;
            }
            const [item] = bms.splice(bmDragSrcIdx, 1);
            const adjustedTarget = bmDragSrcIdx < targetIdx ? targetIdx - 1 : targetIdx;
            const insertAt = before ? adjustedTarget : adjustedTarget + 1;
            bms.splice(insertAt, 0, item);
            saveGroups();
            renderBookmarks();
        }
        function onBmDragEnd() {
            document.querySelectorAll('.bookmark-tile').forEach(el => {
                el.style.opacity = '';
                el.classList.remove('bm-drop-before','bm-drop-after');
            });
            document.querySelectorAll('.group-tab').forEach(el => el.classList.remove('bm-drop-target'));
            bmDragSrcIdx = -1;
            bmDragSrcGroupId = null;
        }

        // 拖到分组标签 —— 跨组移动
        function onGroupTabDragOver(e, gid) {
            if (bmDragSrcIdx < 0) return;
            if (gid === bmDragSrcGroupId) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('bm-drop-target');
        }
        function onGroupTabDragLeave(e) {
            e.currentTarget.classList.remove('bm-drop-target');
        }
        function onGroupTabDrop(e, gid) {
            e.preventDefault();
            e.currentTarget.classList.remove('bm-drop-target');
            if (bmDragSrcIdx < 0 || !bmDragSrcGroupId || gid === bmDragSrcGroupId) return;
            const srcGroup = groups.find(g => g.id === bmDragSrcGroupId);
            const tgtGroup = groups.find(g => g.id === gid);
            if (!srcGroup || !tgtGroup) return;
            if (bmDragSrcIdx >= srcGroup.bookmarks.length) return;
            const [item] = srcGroup.bookmarks.splice(bmDragSrcIdx, 1);
            tgtGroup.bookmarks.push(item);
            // 源组页码越界修正
            const srcTotal = getTotalPages(srcGroup.bookmarks);
            const srcPage = groupPages[bmDragSrcGroupId] || 0;
            if (srcPage >= srcTotal && srcPage > 0) groupPages[bmDragSrcGroupId] = srcPage - 1;
            saveGroups(); savePages();
            renderBookmarks();
        }

        function prevPage() {
            const page = getCurrentPage();
            if (page > 0) { setCurrentPage(page - 1); renderBookmarks(); }
        }

        function nextPage() {
            const page = getCurrentPage();
            const totalPages = getTotalPages(getCurrentBookmarks());
            if (page < totalPages - 1) { setCurrentPage(page + 1); renderBookmarks(); }
        }

        // ===== 分组标签栏 =====

            const container = document.getElementById('group-tabs');

                const active = g.id === currentGroupId ? ' active' : '';

            html += `<button onclick="openNewGroupModal()" class="ml-auto flex-shrink-0 opacity-30 hover:opacity-70 transition-opacity p-1 rounded-lg hover:bg-white/10" title="新建分组"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>`;

        // ===== 新建 / 重命名分组 =====
        let ctxGroupId = null;

        function openNewGroupModal() {
            document.getElementById('group-modal-title').innerText = '新建分组';

        function confirmGroupName() {

        // --- 分组双击/右键重命名（在位编辑，仿笔记）---
        function startRenameGroup(id, e) {
            if (e && e.stopPropagation) e.stopPropagation();
            const tab = document.getElementById('group-tab-' + id);
            const grp = groups.find(g => g.id === id);
            if (!tab || !grp) return;
            const oldName = grp.name;
            tab.contentEditable = 'true';
            tab.focus();
            const range = document.createRange();
            range.selectNodeContents(tab);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = () => {
                tab.contentEditable = 'false';
                const newName = tab.innerText.trim() || oldName;
                grp.name = newName;
                tab.innerText = newName;
                saveGroups();
            };
            tab.onblur = finish;
            tab.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); tab.blur(); }
                if (ev.key === 'Escape') { tab.innerText = oldName; tab.onblur = null; tab.blur(); }
            };
        }

        function startRenameGroupFromCtx() {
            hideGroupCtxMenu();
            const id = ctxGroupId;
            setTimeout(() => startRenameGroup(id, null), 50);

        // ===== 右键 / 长按菜单 =====
        function showGroupCtxMenu(e, groupId, refEl) {
            if (e) e.preventDefault();
            ctxGroupId = groupId;

            const canDelete = groups.length > 1;

        function executeDeleteGroup() {
            const targetId = document.getElementById('del-group-target').value;
            const grp = groups.find(g => g.id === ctxGroupId);
            if (grp && targetId) {
                const targetGroup = groups.find(g => g.id === targetId);

            }
            groups = groups.filter(g => g.id !== ctxGroupId);
            delete groupPages[ctxGroupId];
            saveGroups(); savePages();
            if (currentGroupId === ctxGroupId) currentGroupId = groups[0].id;
            toggleModal('delete-group-modal');

        function saveTodos() { localStorage.setItem('todos.active', JSON.stringify(todos)); }

        // ===== 待办导出（纯文本） =====
        function exportTodos() {
            const pad = n => String(n).padStart(2, '0');
            const fmtDate = ts => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
            };
            const fmtDateTime = ts => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${fmtDate(ts)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            };
            const PRI_TAG = { high: '[高]', medium: '[中]', low: '[低]' };
            const PRI_RANK = { high: 0, medium: 1, low: 2 };

            const active = todos.filter(t => !t.completed)
                .sort((a, b) => (PRI_RANK[a.priority] - PRI_RANK[b.priority]));
            let archived = [];
            try { archived = JSON.parse(localStorage.getItem('todos.completed') || '[]'); } catch (_) {}
            archived.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

            const lines = [];
            lines.push('# 待办清单');
            lines.push(`生成时间：${fmtDateTime(Date.now())}`);
            lines.push('');
            lines.push(`## 进行中（${active.length}）`);
            lines.push('');
            if (active.length === 0) lines.push('（无）');
            active.forEach(t => {
                const parts = [PRI_TAG[t.priority] || '[中]', t.text];
                if (t.dueDate) parts.push(`（截止：${t.dueDate}）`);
                lines.push(`- ${parts.join(' ')}`);
            });
            lines.push('');
            lines.push(`## 已完成（近 30 天，${archived.length}）`);
            lines.push('');
            if (archived.length === 0) lines.push('（无）');
            archived.forEach(t => {
                const when = fmtDate(t.completedAt);
                const pri = PRI_TAG[t.priority] || '[中]';
                lines.push(`- [${when}] ${pri} ${t.text}`);
            });
            lines.push('');

            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks-${fmtDate(Date.now())}.txt`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function archiveCompleted(todo) {
            let arc = JSON.parse(localStorage.getItem('todos.completed') || '[]');
            arc = arc.filter(a => a.id !== todo.id);
            arc.push({ id: todo.id, text: todo.text, priority: todo.priority, completedAt: todo.completedAt });
            const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
            arc = arc.filter(a => a.completedAt > cutoff);
            localStorage.setItem('todos.completed', JSON.stringify(arc));
        }

        function getSortedActive(active) {
            if (todoManualOrder) return active;
            return [...active].sort((a, b) => {
                const pd = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
                if (pd !== 0) return pd;
                if (!a.dueDate && !b.dueDate) return 0;
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            });
        }

        function isDueSoon(dueDate) {
            if (!dueDate) return false;
            const diff = new Date(dueDate) - new Date();
            return diff >= 0 && diff < 24 * 60 * 60 * 1000;
        }

        function buildTodoItemHtml(t, isDone) {
            const dueSoon = !isDone && isDueSoon(t.dueDate);
            const dotColor = { high: 'bg-red-500', medium: 'bg-amber-400', low: 'bg-sky-400' }[t.priority] || 'bg-white/30';
            const priorityDot = isDone ? '' : `<button onclick="showTodoPriorityMenu(event, '${t.id}')" class="w-1.5 h-1.5 rounded-full ${dotColor} flex-shrink-0 mt-[6px] cursor-pointer hover:scale-150 transition-transform" title="修改优先级"></button>`;
            const dueDateHtml = (t.dueDate && !isDone) ? `<span class="block text-[9px] font-black tracking-widest mt-0.5 ${dueSoon ? 'text-orange-400' : 'opacity-30'}">${new Date(t.dueDate).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' })}</span>` : '';
            const dragAttrs = isDone ? '' : `draggable="true" ondragstart="onTodoDragStart(event,'${t.id}')" ondragover="onTodoDragOver(event,'${t.id}')" ondragleave="onTodoDragLeave(event)" ondrop="onTodoDrop(event,'${t.id}')" ondragend="onTodoDragEnd()"`;
            const highBorder = (t.priority === 'high' && !isDone) ? 'border-l-2 border-red-500/60' : '';
            return `<div class="todo-item flex items-start justify-between gap-2 group/item px-3 py-2.5 rounded-2xl hover:bg-white/5 transition-all ${isDone ? 'opacity-50' : ''} ${highBorder}" data-id="${t.id}" ${dragAttrs}>
                <div class="flex items-start gap-2.5 flex-1 min-w-0">
                    ${priorityDot}
                    ${isDone
                        ? `<div class="todo-check done w-5 h-5 rounded-full border border-transparent flex items-center justify-center flex-shrink-0 mt-[1px] transition-all cursor-pointer relative overflow-hidden shadow-[0_0_10px_rgba(16,185,129,0.4)]"
                               onpointerdown="startHoldComplete(event, '${t.id}')"
                               onpointerup="cancelHoldComplete(event)"
                               onpointerleave="cancelHoldComplete(event)"
                               onpointercancel="cancelHoldComplete(event)"><span class="todo-check-fill"></span><i data-lucide="check" class="w-3 h-3 text-white relative"></i></div>`
                        : `<div class="todo-check w-5 h-5 rounded-full border border-white/20 flex items-center justify-center flex-shrink-0 mt-[1px] transition-all cursor-pointer relative overflow-hidden group-hover/item:border-white/50"
                               onpointerdown="startHoldComplete(event, '${t.id}')"
                               onpointerup="cancelHoldComplete(event)"
                               onpointerleave="cancelHoldComplete(event)"
                               onpointercancel="cancelHoldComplete(event)"><span class="todo-check-fill"></span></div>`
                    }
                    <div class="flex-1 min-w-0">
                        <span class="todo-text text-sm font-light tracking-wide leading-snug cursor-text outline-none ${isDone ? 'line-through opacity-60' : 'opacity-80'}" onclick="startEditTodo('${t.id}', event)">${t.text}</span>
                        ${dueDateHtml}
                    </div>
                </div>
                <button onclick="deleteTodoById('${t.id}')" class="opacity-0 group-hover/item:opacity-30 hover:!opacity-100 hover:text-red-400 transition-all p-1 flex-shrink-0 mt-0.5">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
            </div>`;
        }

        // --- 点击优先级小点弹出菜单 ---
        let priorityMenuTodoId = null;
        function showTodoPriorityMenu(e, id) {
            e.stopPropagation();
            priorityMenuTodoId = id;
            const menu = document.getElementById('todo-priority-menu');
            menu.classList.remove('hidden');
            const rect = e.currentTarget.getBoundingClientRect();
            const menuW = 110;
            const x = Math.min(rect.left, window.innerWidth - menuW - 8);
            const y = rect.bottom + 6;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }
        function hideTodoPriorityMenu() {
            document.getElementById('todo-priority-menu').classList.add('hidden');
            priorityMenuTodoId = null;
        }
        function changeTodoPriority(level) {
            const t = todos.find(t => t.id === priorityMenuTodoId);
            hideTodoPriorityMenu();
            if (!t || t.priority === level) return;
            t.priority = level;
            saveTodos();
            renderTodos();
        }
        document.addEventListener('click', (e) => {
            if (!document.getElementById('todo-priority-menu').contains(e.target)) hideTodoPriorityMenu();
        });

        function renderTodos() {
            const active = todos.filter(t => !t.completed);
            const done   = todos.filter(t => t.completed);
            const sorted = getSortedActive(active);

            const list = document.getElementById('todo-list');
            list.innerHTML = sorted.length
                ? sorted.map(t => buildTodoItemHtml(t, false)).join('')
                : `<div class="flex flex-col items-center justify-center opacity-10 py-8"><i data-lucide="list-checks" class="w-10 h-10 mb-3"></i><p class="text-[10px] uppercase tracking-widest font-black">Empty List</p></div>`;

            const section = document.getElementById('todo-completed-section');
            const countEl = document.getElementById('todo-completed-count');
            const doneList = document.getElementById('todo-completed-list');
            const arrow = document.getElementById('todo-completed-arrow');

            if (done.length > 0) {
                section.classList.remove('hidden');
                countEl.textContent = done.length;
                if (completedSectionOpen) {
                    doneList.classList.remove('hidden');
                    doneList.innerHTML = done.map(t => buildTodoItemHtml(t, true)).join('');
                    if (arrow) arrow.style.transform = 'rotate(180deg)';
                } else {
                    doneList.classList.add('hidden');
                    if (arrow) arrow.style.transform = '';
                }
            } else {
                section.classList.add('hidden');
            }

            const sortBtn = document.getElementById('todo-sort-btn');
            if (sortBtn) sortBtn.style.opacity = todoManualOrder ? '0.4' : '0';

            lucide.createIcons();
        }

        function toggleCompletedSection() {
            completedSectionOpen = !completedSectionOpen;
            renderTodos();
        }

        function startEditTodo(id, e) {
            if (e) e.stopPropagation();
            const t = todos.find(x => x.id === id);
            if (!t) return;
            const item = document.querySelector(`.todo-item[data-id="${id}"]`);
            if (!item) return;
            const span = item.querySelector('.todo-text');
            if (!span || span.isContentEditable) return;
            const oldText = t.text;
            const wasDraggable = item.getAttribute('draggable');
            item.setAttribute('draggable', 'false');
            span.contentEditable = 'true';
            span.focus();
            const range = document.createRange();
            range.selectNodeContents(span);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = (commit) => {
                span.onblur = null;
                span.onkeydown = null;
                span.contentEditable = 'false';
                if (wasDraggable !== null) item.setAttribute('draggable', wasDraggable);
                if (commit) {
                    const newText = span.innerText.trim();
                    if (newText && newText !== oldText) {
                        t.text = newText;
                        saveTodos();
                    }
                }
                renderTodos();
            };
            span.onblur = () => finish(true);
            span.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
                else if (ev.key === 'Escape') { ev.preventDefault(); span.innerText = oldText; finish(false); }
            };
        }

        function setTodoPriority(p) {
            currentTodoPriority = p;
            document.querySelectorAll('[data-priority]').forEach(btn => {
                const active = btn.dataset.priority === p;
                btn.style.opacity = active ? '1' : '0.4';
                btn.style.background = active ? 'rgba(255,255,255,0.15)' : 'transparent';
            });
        }

        function addTodo() {
            currentTodoPriority = 'medium';
            document.getElementById('todo-input').value = '';
            document.getElementById('todo-due').value = '';
            setTodoPriority('medium');
            toggleModal('todo-modal');
            setTimeout(() => document.getElementById('todo-input').focus(), 100);
        }

        function confirmAddTodo() {
            const text = document.getElementById('todo-input').value.trim();
            if (!text) return;
            const todo = {
                id: 'td-' + Date.now(),
                text,
                completed: false,
                priority: currentTodoPriority,
                dueDate: document.getElementById('todo-due').value || null,
                createdAt: Date.now(),
                completedAt: null
            };
            todos.push(todo);
            saveTodos();
            renderTodos();
            toggleModal('todo-modal');
        }

        function toggleTodo(id) {
            const t = todos.find(t => t.id === id);
            if (!t) return;
            t.completed = !t.completed;
            t.completedAt = t.completed ? Date.now() : null;
            if (t.completed) {
                archiveCompleted(t);
                if (typeof changePetMood === 'function') { changePetMood(+1); touchPetInteract(); }
                document.dispatchEvent(new CustomEvent('pet:celebrate', { detail: { duration: 1500 } }));
            }
            saveTodos();
            renderTodos();
        }

        // 长按切换完成状态：按住 1.5s 触发翻转，松开/移出即取消
        // 未完成 → 水位 0%→100% 涨起；已完成 → 水位 100%→0% 回落
        let _holdTodoTimer = null;
        let _holdTodoEl = null;
        function startHoldComplete(e, id) {
            e.preventDefault();
            const circle = e.currentTarget;
            cancelHoldComplete();
            _holdTodoEl = circle;
            circle.classList.add('holding');
            try { circle.setPointerCapture(e.pointerId); } catch(_) {}
            _holdTodoTimer = setTimeout(() => {
                _holdTodoTimer = null;
                if (_holdTodoEl) _holdTodoEl.classList.remove('holding');
                _holdTodoEl = null;
                const t = todos.find(x => x.id === id);
                if (!t) return;
                const willComplete = !t.completed;
                t.completed = willComplete;
                t.completedAt = willComplete ? Date.now() : null;
                if (willComplete) {
                    archiveCompleted(t);
                    if (typeof changePetMood === 'function') { changePetMood(+1); touchPetInteract(); }
                    document.dispatchEvent(new CustomEvent('pet:celebrate', { detail: { duration: 1500 } }));
                }
                saveTodos();
                renderTodos();
            }, 1500);
        }
        function cancelHoldComplete() {
            if (_holdTodoTimer) { clearTimeout(_holdTodoTimer); _holdTodoTimer = null; }
            if (_holdTodoEl) { _holdTodoEl.classList.remove('holding'); _holdTodoEl = null; }
        }

        function deleteTodoById(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        function resetTodoSort() {
            todoManualOrder = false;
            localStorage.setItem('todos.manualOrder', 'false');
            renderTodos();
        }

        // ===== 拖拽排序 =====
        function onTodoDragStart(e, id) {
            todoDragSrcId = id;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => {
                const el = document.querySelector('.todo-item[data-id="' + id + '"]');
                if (el) el.style.opacity = '0.3';
            }, 0);
        }

        function onTodoDragOver(e, id) {
            e.preventDefault();
            if (id === todoDragSrcId) return;
            document.querySelectorAll('.todo-item').forEach(el => { el.style.borderTop = ''; el.style.borderBottom = ''; });
            const el = document.querySelector('.todo-item[data-id="' + id + '"]');
            if (el) {
                const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
                el.style[e.clientY < mid ? 'borderTop' : 'borderBottom'] = '2px solid rgba(255,255,255,0.55)';
            }
        }

        function onTodoDragLeave(e) { /* 由 dragover 的清除处理 */ }

        function onTodoDrop(e, targetId) {
            e.preventDefault();
            if (todoDragSrcId === targetId) return;
            const srcIdx = todos.findIndex(t => t.id === todoDragSrcId);
            const tgtIdx = todos.findIndex(t => t.id === targetId);
            if (srcIdx === -1 || tgtIdx === -1) return;
            const el = document.querySelector('.todo-item[data-id="' + targetId + '"]');
            let before = true;
            if (el) {
                const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
                before = e.clientY < mid;
            }
            const [item] = todos.splice(srcIdx, 1);
            const newTgt = todos.findIndex(t => t.id === targetId);
            todos.splice(before ? newTgt : newTgt + 1, 0, item);
            todoManualOrder = true;
            localStorage.setItem('todos.manualOrder', 'true');
            saveTodos();
            renderTodos();
        }

        function onTodoDragEnd() {
            document.querySelectorAll('.todo-item').forEach(el => { el.style.opacity = ''; el.style.borderTop = ''; el.style.borderBottom = ''; });
            todoDragSrcId = null;
        }

        const audioSources = {
            rain: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/master/audio/rain.mp3',
            ocean: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/master/audio/ocean.mp3',
            forest: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/master/audio/birds.mp3',
            fire: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/master/audio/fireplace.mp3'
        };

        // 每条音轨的相对增益：雨声/海浪原始录音偏大，统一降到 25%
        const TRACK_GAIN = { rain: 0.1, ocean: 0.2, forest: 1, fire: 1 };
        // 雨声/海浪起播淡入：从 FADEIN_START_GAIN 线性过渡到 TRACK_GAIN
        const FADEIN_TRACKS = new Set(['rain', 'ocean']);
        const FADEIN_START_GAIN = { rain: 0.03, ocean: 0.05 };
        const FADEIN_DURATION = { rain: 10000, ocean: 3000 };
        let currentAudioType = 'none';
        let userVolume = 0.8;
        let fadeRaf = null;
        let fadeGain = null;

        function cancelFadeIn() {
            if (fadeRaf) cancelAnimationFrame(fadeRaf);
            fadeRaf = null;
            fadeGain = null;
        }

        function startFadeIn() {
            cancelFadeIn();
            const target = TRACK_GAIN[currentAudioType] ?? 1;
            const duration = FADEIN_DURATION[currentAudioType] ?? 3000;
            const startGain = FADEIN_START_GAIN[currentAudioType] ?? 0.05;
            const start = performance.now();
            fadeGain = startGain;
            applyEffectiveVolume();
            const tick = (now) => {
                const t = Math.min(1, (now - start) / duration);
                fadeGain = startGain + (target - startGain) * t;
                applyEffectiveVolume();
                if (t < 1) {
                    fadeRaf = requestAnimationFrame(tick);
                } else {
                    fadeRaf = null;
                    fadeGain = null;
                }
            };
            fadeRaf = requestAnimationFrame(tick);
        }

        function applyEffectiveVolume() {
            const audio = document.getElementById('bg-audio');
            const gain = fadeGain ?? (TRACK_GAIN[currentAudioType] ?? 1);
            audio.volume = Math.max(0, Math.min(1, userVolume * gain));
        }

        const WEATHER_COORDS_KEY = 'weather.coords';
        const WEATHER_COORDS_TTL = 7 * 24 * 3600 * 1000;
        function loadWeatherCoords() {
            try {
                const raw = localStorage.getItem(WEATHER_COORDS_KEY);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (!obj || typeof obj.lat !== 'number' || typeof obj.lon !== 'number') return null;
                if (Date.now() - (obj.ts || 0) > WEATHER_COORDS_TTL) return null;
                return obj;
            } catch (_) { return null; }
        }

        async function renderWeatherAt(lat, lon) {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);

            const weather = data.current_weather;
            document.getElementById('weather-temp').innerText = `${Math.round(weather.temperature)}°C`;
            document.getElementById('weather-desc').innerText = getWeatherDesc(weather.weathercode);
        }
        async function fetchWeather() {
            try {
                const cached = loadWeatherCoords();
                if (cached) {
                    await renderWeatherAt(cached.lat, cached.lon);
                    return;
                }
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    saveWeatherCoords(lat, lon);
                    await renderWeatherAt(lat, lon);
                }, () => {
                    document.getElementById('weather-desc').innerText = "需要定位权限";
                });
            } catch (e) {
                console.error("Weather fetch failed");
            }

        async function tryFetchWithFallback() {
            const primary = getHitokotoSource();
            const order = [primary, ...Object.keys(HITOKOTO_SOURCES).filter(k => k !== primary)];
            let lastErr;
            for (const key of order) {
                try {

                    if (result && result.text) return result;
                } catch (err) {
                    lastErr = err;
                    console.warn(`[hitokoto] source "${key}" failed:`, err);

            }
            throw lastErr || new Error('all sources failed');

                    if (custom && custom.text) {
                        showHitokoto(custom.text, '');
                        return;
                    }
                } catch {}
            }

            try {
                const { text, from } = await tryFetchWithFallback();
                localStorage.setItem(HITOKOTO_LAST_API_KEY, JSON.stringify({ text, from }));
                showHitokoto(text, from);
            } catch (err) {
                console.error('Failed to fetch hitokoto:', err);
                const lastRaw = localStorage.getItem(HITOKOTO_LAST_API_KEY);
                if (lastRaw) {
                    try {
                        const last = JSON.parse(lastRaw);

        function customizeHitokoto(e) {
            if (e) e.stopPropagation();
            const textEl = document.getElementById('hitokoto');
            const fromEl = document.getElementById('hitokoto-from');
            if (textEl.isContentEditable) return;
            const oldText = textEl.innerText;
            textEl.contentEditable = 'true';
            textEl.focus();
            const range = document.createRange();
            range.selectNodeContents(textEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = (commit) => {
                textEl.onblur = null;
                textEl.onkeydown = null;
                textEl.contentEditable = 'false';
                if (!commit) {
                    textEl.innerText = oldText;
                    return;
                }
                const newText = textEl.innerText.trim();
                if (!newText) {
                    localStorage.removeItem(HITOKOTO_CUSTOM_KEY);
                    fetchHitokoto();
                    return;
                }
                fromEl.innerText = '';
                localStorage.setItem(HITOKOTO_CUSTOM_KEY, JSON.stringify({ text: newText }));
            };
            textEl.onblur = () => finish(true);
            textEl.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); textEl.blur(); }
                else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); textEl.blur(); }
            };
        }

        async function submitFeedback() {
            const category = document.getElementById('fb-category').value;
            const content  = document.getElementById('fb-content').value.trim();
            const nickname = document.getElementById('fb-nickname').value.trim();
            const email    = document.getElementById('fb-email').value.trim();
            const btn = document.getElementById('fb-submit');

            if (!content) { showFbMsg('请填写反馈内容', 'warn'); return; }

            btn.disabled = true;
            btn.innerText = '发送中…';
            // 5 秒超时：AbortController 掐 fetch + 保底 timer 强制关窗（防止 fetch 异常卡住）
            const controller = new AbortController();
            const FEEDBACK_TIMEOUT_MS = 5000;
            const timeoutId = setTimeout(() => controller.abort(), FEEDBACK_TIMEOUT_MS);
            const hardCloseId = setTimeout(() => {
                toggleModal('feedback-modal');
                resetFeedbackForm();
                btn.disabled = false;
                btn.innerText = '发送';
            }, FEEDBACK_TIMEOUT_MS + 500);
            try {
                const res = await fetch(FEEDBACK_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        '类别': category,
                        '反馈内容': content,
                        '昵称': nickname || '(未填写)',
                        '邮箱': email || '(未填写)',
                        '来源': location.href,
                        _subject: `[Ayu Tab 反馈] ${category === 'bug' ? 'Bug 问题' : category === 'feature' ? '功能建议' : '其他'}`,
                        _template: 'table',
                        _captcha: 'false'
                    }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                clearTimeout(hardCloseId);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                showFbMsg('感谢反馈，已送达', 'ok');
                setTimeout(() => {
                    toggleModal('feedback-modal');
                    resetFeedbackForm();
                }, 1500);
            } catch (e) {
                clearTimeout(timeoutId);
                clearTimeout(hardCloseId);
                if (e.name === 'AbortError') {
                    showFbMsg('网络较慢，反馈已放弃发送', 'err');
                    setTimeout(() => {
                        toggleModal('feedback-modal');
                        resetFeedbackForm();
                    }, 800);
                } else {
                    showFbMsg('发送失败：' + e.message, 'err');
                }
            } finally {
                btn.disabled = false;
                btn.innerText = '发送';
            }

        function updateNoteScrollIndicator() {
            const np = document.getElementById('notepad');
            const ind = document.getElementById('note-scroll-indicator');

            const total = Math.max(1, Math.ceil(np.scrollHeight / Math.max(1, np.clientHeight)));
            if (total <= 1) { ind.innerText = '1/1'; return; }
            const maxScroll = np.scrollHeight - np.clientHeight;
            const ratio = maxScroll > 0 ? np.scrollTop / maxScroll : 0;
            const current = Math.min(total, Math.max(1, Math.round(1 + ratio * (total - 1))));
            ind.innerText = `${current}/${total}`;
        }

        // --- 双击重命名 ---
        function startRenameNote(id, e) {
            e.stopPropagation();

            const note = notesList.find(n => n.id === id);
            if (!tab || !note) return;
            const oldTitle = note.title;
            tab.contentEditable = 'true';
            tab.focus();
            const range = document.createRange();
            range.selectNodeContents(tab);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = () => {
                tab.contentEditable = 'false';
                const newTitle = tab.innerText.trim() || oldTitle;
                note.title = newTitle;
                tab.innerText = newTitle;
                saveNotes();
            };
            tab.onblur = finish;
            tab.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); tab.blur(); }
                if (ev.key === 'Escape') { tab.innerText = oldTitle; tab.onblur = null; tab.blur(); }
            };
        }

        // ===== 番茄钟 =====
        const POMODORO_KEY = 'pomodoro_state';
        const SHORT_BREAK = 5, LONG_BREAK = 15, ROUNDS = 4;
        let pomodoroTick = null;
        const pomoEl = {
            panel: null, setup: null, run: null, phase: null, time: null, pauseBtn: null
        };
        function initPomoEls() {
            pomoEl.panel = document.getElementById('pomodoro-panel');
            pomoEl.setup = document.getElementById('pomodoro-setup');
            pomoEl.run = document.getElementById('pomodoro-run');
            pomoEl.phase = document.getElementById('pomodoro-phase');
            pomoEl.time = document.getElementById('pomodoro-time');
            pomoEl.pauseBtn = document.getElementById('pomodoro-pause');
        }

        document.querySelectorAll('.pomo-dur-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.pomo-dur-btn').forEach(x => x.classList.remove('active'));
