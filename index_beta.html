        });

        function getPomoFocusMin() {
            const custom = parseInt(document.getElementById('pomodoro-custom').value, 10);
            if (custom && custom > 0) return Math.min(custom, 180);
            const active = document.querySelector('.pomo-dur-btn.active');
            return active ? parseInt(active.dataset.pomoDur, 10) : 25;
        }

        function savePomoState(s) { localStorage.setItem(POMODORO_KEY, JSON.stringify(s)); }
        function loadPomoState() {
            try { return JSON.parse(localStorage.getItem(POMODORO_KEY)); } catch { return null; }
        }
        function clearPomoState() { localStorage.removeItem(POMODORO_KEY); }

        function phaseLabel(s) {
            if (s.phase === 'focus') return `专注 · 第 ${s.round} 轮`;
            if (s.phase === 'short') return '短休息';
            return '长休息';
        }
        function phaseDurationMin(s) {
            if (s.phase === 'focus') return s.focusMin;
            if (s.phase === 'short') return SHORT_BREAK;
            return LONG_BREAK;
        }

        function notifyPomo(title, body) {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'granted') new Notification(title, { body });
        }

        function renderPomoRunning(s) {
            if (!pomoEl.panel) initPomoEls();
            pomoEl.setup.classList.add('hidden');
            pomoEl.run.classList.remove('hidden');
            pomoEl.phase.textContent = phaseLabel(s) + (s.paused ? ' · 已暂停' : '');
            const remainMs = s.paused ? s.remainMs : (s.endAt - Date.now());
            const remain = Math.max(0, Math.round(remainMs / 1000));
            const m = String(Math.floor(remain / 60)).padStart(2, '0');
            const sec = String(remain % 60).padStart(2, '0');
            pomoEl.time.textContent = `${m}:${sec}`;
            if (pomoEl.pauseBtn) pomoEl.pauseBtn.textContent = s.paused ? '继续' : '暂停';
        }
        function renderPomoIdle() {
            if (!pomoEl.panel) initPomoEls();
            pomoEl.setup.classList.remove('hidden');
            pomoEl.run.classList.add('hidden');
        }

        function togglePomodoroPause() {
            const s = loadPomoState();
            if (!s) return;
            if (s.paused) {
                s.endAt = Date.now() + s.remainMs;
                delete s.paused;
                delete s.remainMs;
                savePomoState(s);
                runPomoLoop();
            } else {
                s.paused = true;
                s.remainMs = Math.max(0, s.endAt - Date.now());
                savePomoState(s);
                if (pomodoroTick) { clearInterval(pomodoroTick); pomodoroTick = null; }
                renderPomoRunning(s);
                document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: false } }));
                return;
            }
            document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: true } }));
        }

        function startPomodoro() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
            const focusMin = getPomoFocusMin();
            const state = {
                focusMin,
                phase: 'focus',
                round: 1,
                endAt: Date.now() + focusMin * 60 * 1000
            };
            savePomoState(state);
            runPomoLoop();
            document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: true } }));
        }

        function stopPomodoro() {
            if (pomodoroTick) { clearInterval(pomodoroTick); pomodoroTick = null; }
            clearPomoState();
            renderPomoIdle();
            document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: false } }));
        }

        function skipPomodoro() {
            const s = loadPomoState();
            if (!s) return;
            s.endAt = Date.now();
            savePomoState(s);
        }

        function advancePomoPhase(s) {
            const finished = s.phase;
            const finishedRound = s.round;
            if (finished === 'focus') {
                document.dispatchEvent(new CustomEvent('pomodoro:focus-complete', { detail: { round: finishedRound } }));
                notifyPomo('🍅 专注结束', '休息一下！');
                if (finishedRound >= ROUNDS) {
                    document.dispatchEvent(new CustomEvent('pomodoro:cycle-complete', { detail: { rounds: ROUNDS } }));
                    s.phase = 'long';
                } else {
                    s.phase = 'short';
                }
            } else {
                notifyPomo('🍅 休息结束', '继续加油！');
                if (finished === 'long') {
                    clearPomoState();
                    renderPomoIdle();
                    document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: false } }));
                    return null;
                }
                s.phase = 'focus';
                s.round = finishedRound + 1;
            }
            s.endAt = Date.now() + phaseDurationMin(s) * 60 * 1000;
            savePomoState(s);
            return s;
        }

        function runPomoLoop() {
            if (pomodoroTick) clearInterval(pomodoroTick);
            const step = () => {
                let s = loadPomoState();
                if (!s) { clearInterval(pomodoroTick); pomodoroTick = null; renderPomoIdle(); return; }
                if (s.paused) { renderPomoRunning(s); return; }
                if (Date.now() >= s.endAt) {
                    s = advancePomoPhase(s);
                    if (!s) { clearInterval(pomodoroTick); pomodoroTick = null; return; }
                }
                renderPomoRunning(s);
            };
            step();
            pomodoroTick = setInterval(step, 500);
        }

        // 刷新恢复
        (function restorePomo() {
            const s = loadPomoState();
            if (!s) return;
            if (s.paused) { renderPomoRunning(s); return; }
            if (s.endAt) {
                runPomoLoop();
                document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: true } }));
            }
        })();

        // ===== 番茄钟 ↔ 宠物 联动（通过 CustomEvent 解耦） =====
        document.addEventListener('pomodoro:focus-complete', () => {
            if (typeof changePetMood === 'function') { changePetMood(+2); touchPetInteract(); }
            triggerCelebrate(2400);
        });
        document.addEventListener('pomodoro:cycle-complete', () => {
            triggerCelebrate(3000);
        });

        // ===== 宠物被动感知（通过 CustomEvent 解耦） =====
        // 事件结束后延迟 3s 才回到默认状态
        const PET_EVENT_TAIL_MS = 3000;
        let _petFocusedOffTimer = null;
        let _petCheeringOffTimer = null;
        // 打字中 → focused；停止打字 3 秒后回到默认
        document.addEventListener('pet:input-active', e => {
            if (petLoadSleep) return;
            const on = !!(e.detail && e.detail.on);
            clearTimeout(_petFocusedOffTimer);
            if (on) {
                setPetPassive('focused', true);
            } else {
                _petFocusedOffTimer = setTimeout(() => setPetPassive('focused', false), PET_EVENT_TAIL_MS);
            }
        });
        // 完成 Todo → 庆祝 1.5 秒（由 dispatch 方指定 duration，默认 1500ms）
        document.addEventListener('pet:celebrate', e => {
            if (petLoadSleep) return;
            triggerCelebrate((e.detail && e.detail.duration) || 1500);
        });
        // 番茄钟进行中 → cheering；停止 3 秒后回到默认
        document.addEventListener('pet:cheer', e => {
            if (petLoadSleep) return;
            const on = !!(e.detail && e.detail.on);
            clearTimeout(_petCheeringOffTimer);
            if (on) {
                setPetPassive('cheering', true);
            } else {
                _petCheeringOffTimer = setTimeout(() => setPetPassive('cheering', false), PET_EVENT_TAIL_MS);
            }
        });
        // 长时间空闲 → yawning 1.5s → sleeping；任意鼠标移动惊醒
        let _petYawnTimer = null;
        document.addEventListener('pet:long-idle', e => {
            if (petLoadSleep) return;
            const on = !!(e.detail && e.detail.on);
            if (typeof isPetActive === 'function' && isPetActive()) {
                // 活跃模式：交给 FSM，内部也会播 yawning
                if (on) fsmEnter('sleeping');
                else fsmWakeFromSleep();
                return;
            }
            // 安静模式：yawning 1.5s 过渡后进入 sleeping
            clearTimeout(_petYawnTimer);
            if (on) {
                setPetPassive('yawning', true);
                _petYawnTimer = setTimeout(() => {
                    setPetPassive('yawning', false);
                    setPetPassive('sleeping', true);
                }, 1500);
            } else {
                setPetPassive('yawning', false);
                setPetPassive('sleeping', false);
            }
        });

        // 输入框活跃探测：聚焦 Note 编辑器或 Todo 输入框时触发 watch
        (function inputActiveWatcher() {
            function isWatched(t) {
                if (!t) return false;
                if (t.id === 'todo-input') return true;
                if (t.id === 'notepad') return true;
                return false;
            }
            document.addEventListener('focusin', e => {
                if (isWatched(e.target))
                    document.dispatchEvent(new CustomEvent('pet:input-active', { detail: { on: true } }));
            });
            document.addEventListener('focusout', e => {
                if (isWatched(e.target))
                    document.dispatchEvent(new CustomEvent('pet:input-active', { detail: { on: false } }));

        // 加载睡眠锁 —— 必须在 petIdleWatcher IIFE 之前声明（IIFE 末尾会立即调用 reset()，
        // 如果 reset 里引用了 TDZ 中的 let 变量会抛 ReferenceError 导致整个脚本中断）
        var petLoadSleep = false;

        // 空闲探测器：>10 分钟无任何活动则进入睡眠；同时节流刷新 pet.lastActiveTime
        (function petIdleWatcher() {
            const IDLE_MS = 10 * 60 * 1000;
            let timer = null;
            let sleeping = false;
            let _lastActiveWrite = 0;
            function reset() {
                // 节流 30s 写入 lastActiveTime（供下次加载判断是否进入睡眠）
                const _now = Date.now();
                if (_now - _lastActiveWrite > 30000) {
                    touchLastActive();
                    _lastActiveWrite = _now;
                }
                // 加载睡眠激活时：活动只负责刷时间戳，不唤醒（只响应宠物点击）
                if (petLoadSleep) { clearTimeout(timer); return; }
                if (sleeping) {
                    sleeping = false;
                    document.dispatchEvent(new CustomEvent('pet:long-idle', { detail: { on: false } }));
                }
                clearTimeout(timer);
                timer = setTimeout(() => {
                    sleeping = true;
                    document.dispatchEvent(new CustomEvent('pet:long-idle', { detail: { on: true } }));
                }, IDLE_MS);
            }
            ['mousemove', 'keydown', 'scroll', 'click', 'touchstart'].forEach(ev =>
                window.addEventListener(ev, reset, { passive: true }));
            document.addEventListener('visibilitychange', () => { if (!document.hidden) reset(); });
            reset();
        })();

        // ===== 笔记导出（txt / md / html / doc） =====
        function exportCurrentNote(fmt) {
            document.getElementById('note-export-dropdown').classList.add('hidden');
            const note = getCurrentNote();
            if (!note) return;
            const safeTitle = (note.title || '未命名').replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
            const html = note.content || '';
            let blob, ext;
            if (fmt === 'txt') {
                blob = new Blob([htmlToPlainText(html)], { type: 'text/plain;charset=utf-8' });
                ext = 'txt';
            } else if (fmt === 'md') {
                blob = new Blob([htmlToMarkdown(html)], { type: 'text/markdown;charset=utf-8' });
                ext = 'md';
            } else if (fmt === 'html') {
                const full = `<!DOCTYPE html>\n<html lang="zh-CN"><head><meta charset="utf-8"><title>${escapeHtml(note.title || '笔记')}</title><style>body{font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7;color:#222}</style></head><body><h1>${escapeHtml(note.title || '')}</h1>\n${html}\n</body></html>`;
                blob = new Blob([full], { type: 'text/html;charset=utf-8' });
                ext = 'html';
            } else if (fmt === 'doc') {
                // Word 可直接打开这种带 MIME 头的 HTML 文档
                const full = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${escapeHtml(note.title || '笔记')}</title></head><body><h1>${escapeHtml(note.title || '')}</h1>\n${html}\n</body></html>`;
                blob = new Blob([full], { type: 'application/msword;charset=utf-8' });
                ext = 'doc';
            } else {
                return;
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${safeTitle}.${ext}`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function escapeHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // HTML → 纯文本：解码实体 + 块级元素转换行
        function htmlToPlainText(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = (html || '')
                .replace(/<(br|\/p|\/div|\/h[1-6]|\/li|\/tr)\s*\/?>/gi, '$&\n')
                .replace(/<(p|div|h[1-6]|li|tr)(\s[^>]*)?>/gi, '\n$&');
            return (tmp.textContent || '').replace(/\n{3,}/g, '\n\n').trim() + '\n';
        }

        // HTML → Markdown：覆盖常见富文本标签；未识别的直接取文本
        function htmlToMarkdown(html) {
            const doc = new DOMParser().parseFromString('<div id="r">' + (html || '') + '</div>', 'text/html');
            function walk(node) {
                if (node.nodeType === Node.TEXT_NODE) return node.textContent;
                if (node.nodeType !== Node.ELEMENT_NODE) return '';
                const tag = node.tagName.toLowerCase();
                const inner = Array.from(node.childNodes).map(walk).join('');
                switch (tag) {
                    case 'h1': return `\n# ${inner}\n\n`;
                    case 'h2': return `\n## ${inner}\n\n`;
                    case 'h3': return `\n### ${inner}\n\n`;
                    case 'h4': return `\n#### ${inner}\n\n`;
                    case 'h5': return `\n##### ${inner}\n\n`;
                    case 'h6': return `\n###### ${inner}\n\n`;
                    case 'p':  return `${inner}\n\n`;
                    case 'br': return '\n';
                    case 'b': case 'strong': return `**${inner}**`;
                    case 'i': case 'em':     return `*${inner}*`;
                    case 'u':                return inner; // markdown 无原生下划线
                    case 's': case 'strike': case 'del': return `~~${inner}~~`;
                    case 'code': return '`' + inner + '`';
                    case 'pre':  return '\n```\n' + inner + '\n```\n\n';
                    case 'a':    return `[${inner}](${node.getAttribute('href') || ''})`;
                    case 'img':  return `![${node.getAttribute('alt') || ''}](${node.getAttribute('src') || ''})`;
                    case 'ul':   return '\n' + Array.from(node.children).map(li => `- ${walk(li).trim()}`).join('\n') + '\n\n';
                    case 'ol':   return '\n' + Array.from(node.children).map((li, i) => `${i + 1}. ${walk(li).trim()}`).join('\n') + '\n\n';
                    case 'li':   return inner;
                    case 'blockquote': return '\n' + inner.split('\n').map(l => `> ${l}`).join('\n') + '\n\n';
                    case 'hr':   return '\n---\n\n';
                    case 'div':  return inner + '\n';
                    default:     return inner;
                }
            }
            return walk(doc.getElementById('r')).replace(/\n{3,}/g, '\n\n').trim() + '\n';
        }

        // ===== 心情系统 =====

        function attachPetDrag() {
            const el = document.getElementById('pet');
            if (!el || el._dragAttached) return;
            el._dragAttached = true;
            let startX, startY, originLeft, originTop, dragging = false, moved = false, pid = null, lastX = 0, dragScale = 1;
            let clampMaxLeft = Infinity, clampMaxTop = Infinity, clampEnabled = false;
            el.addEventListener('pointerdown', e => {
                if (e.button !== 0) return;
                pid = e.pointerId;
                startX = e.clientX; startY = e.clientY;
                el.style.transition = 'none';
                // 以当前父元素（即 absolute 定位的包含块）为基准，把视口位移换算到本地坐标系
                const parent = el.parentElement || document.body;
                const pRect = parent.getBoundingClientRect();
                dragScale = parent.offsetWidth ? (pRect.width / parent.offsetWidth) : 1;
                if (!isFinite(dragScale) || dragScale <= 0) dragScale = 1;
                const rect = el.getBoundingClientRect();
                originLeft = (rect.left - pRect.left) / dragScale;
                originTop  = (rect.top  - pRect.top ) / dragScale;
                lastX = originLeft;
                dragging = true; moved = false;
                // 宠物始终挂在 #main-container 内，拖拽 clamp 到父容器边界
                clampEnabled = true;
                const pw = parent.clientWidth || parent.offsetWidth || 0;
                const ph = parent.clientHeight || parent.offsetHeight || 0;
                clampMaxLeft = Math.max(0, pw - el.offsetWidth);
                clampMaxTop  = Math.max(0, ph - el.offsetHeight);
                el.setPointerCapture(pid);
            });
            el.addEventListener('pointermove', e => {
                if (!dragging) return;
                const dx = (e.clientX - startX) / dragScale;
                const dy = (e.clientY - startY) / dragScale;
                if (!moved && Math.hypot(dx * dragScale, dy * dragScale) > 6) {
                    moved = true;
                    el.classList.add('dragging', 'pinned');
                    el.dataset.pinned = 'true';
                    setPetPassive('dragged', true);
                }
                if (moved) {
                    let newLeft = originLeft + dx;
                    let newTop  = originTop + dy;
                    if (clampEnabled) {
                        newLeft = Math.max(0, Math.min(newLeft, clampMaxLeft));
                        newTop  = Math.max(0, Math.min(newTop,  clampMaxTop));
                    }
                    if (Math.abs(newLeft - lastX) > 2) {
                        if (petFsm.state !== 'sleeping' && petFsm.state !== 'yawning') {
                            el.classList.toggle('facing-left', newLeft < lastX);
                        }
                        lastX = newLeft;
                    }
                    el.style.left = newLeft + 'px';
                    el.style.top  = newTop + 'px';
                }
            });
            const finish = e => {
                if (!dragging) return;
                dragging = false;
                if (pid != null) { try { el.releasePointerCapture(pid); } catch (_) {} pid = null; }
                el.style.transition = '';
                if (moved) {
                    el.classList.remove('dragging');
                    const x = parseFloat(el.style.left) || 0;
                    const y = parseFloat(el.style.top) || 0;

                    // 拖拽结束立即回到默认状态
                    clearTimeout(el._draggedOffTimer);
                    setPetPassive('dragged', false);
                }
            };
            el.addEventListener('pointerup', finish);
            el.addEventListener('pointercancel', finish);
        }

        // ===== 活跃（active）模式：大幅度全屏游走；安静（quiet）模式：围绕当前位置短距离随机走动（两者都在 main-container 范围内）=====
        // 兼容迁移：旧版使用 pet.free 键，一次性迁入 pet.active；首次访问默认活跃

        // 首次出场 / 刷新兜底的右上角默认落位（贴近呼吸式宠物按钮）
        function getPetInitialCorner() {
            const root = document.getElementById('main-container');

        function getPetObstacleRects() {
            // 所有玻璃面板（搜索框 + 各分栏）都是宠物的禁区（视口坐标）
            const SELECTORS = ['.search-container', '#panel-shortcuts', '#panel-note-col', '#panel-todo-col'];
            const rects = [];
            SELECTORS.forEach(sel => {
                document.querySelectorAll(sel).forEach(node => {
                    if (!node.offsetParent && node !== document.documentElement) return;
                    const r = node.getBoundingClientRect();
                    if (r.width > 0 && r.height > 0) rects.push(r);

        // ===== 右上角宠物下拉菜单 =====

                    }
                }, 500);
            }, 300);
        }

        function triggerCelebrate(ms) {
            petActiveStates.add('celebrate');
            recomputePetState();
            clearTimeout(petTimers.celebrate);
            petTimers.celebrate = setTimeout(() => {
                petActiveStates.delete('celebrate');
                petTimers.celebrate = null;
                recomputePetState();
            }, ms || 1500);
        }

        // FX：开心显示星星，难过显示乌云
        const FX_STAR_SVG = '<svg class="fx-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.5 6.5L21 9l-5 4.5L17.5 21 12 17l-5.5 4L8 13.5 3 9l6.5-.5z"/></svg>';
        const FX_CLOUD_SVG = '<svg class="fx-cloud" viewBox="0 0 36 22" fill="currentColor"><path d="M9 18c-3 0-6-2-6-5.5S6 7 9 7c0.5-3 3.5-5 6.5-5s5.5 2 6 5c3 0 6 2 6 5.5S24.5 18 21.5 18z"/></svg>';
        // 心情发生区间变化时短暂闪现 FX：显示 3 秒后慢慢淡出
        function flashPetMoodFx() {
            const fx = document.getElementById('pet-mood-fx');
            if (!fx) return;
            const m = loadPetMood();
            if (m >= 4) {
                fx.innerHTML = FX_STAR_SVG + FX_STAR_SVG + FX_STAR_SVG;
            } else if (m <= 2) {
                fx.innerHTML = FX_CLOUD_SVG + '<div class="fx-drop"></div><div class="fx-drop"></div><div class="fx-drop"></div>';
            } else {
                // 回到普通区间：不再展示装饰
                fx.classList.remove('show');
                clearTimeout(fx._clearTimer);
                fx._clearTimer = setTimeout(() => { fx.innerHTML = ''; }, 800);
                return;
            }
            clearTimeout(fx._clearTimer);
            clearTimeout(fx._hideTimer);
            fx.classList.add('show');
            fx._hideTimer = setTimeout(() => {
                fx.classList.remove('show');
                fx._clearTimer = setTimeout(() => { fx.innerHTML = ''; }, 900);
            }, 3000);
        }

        // 页面加载时计算回落 + 长期未打开惩罚
        function settlePetMoodOnLoad() {
            const now = Date.now();
            const lastInteract = loadPetLastInteract();
            const lastLoad = loadPetLastLoad();
            let m = loadPetMood();

            // 距上次互动超过2小时且 m>3 → 每满2小时 -1，回落至3
            const TWO_H = 2 * 3600 * 1000;
            const sinceInteract = now - lastInteract;
            if (m > 3 && sinceInteract > TWO_H) {
                const dropSteps = Math.floor(sinceInteract / TWO_H);
                m = Math.max(3, m - dropSteps);
            }

            // 长期未打开页面
            if (lastLoad != null) {
                const sinceLoad = now - lastLoad;
                if (sinceLoad > 24 * 3600 * 1000) m = Math.min(m, 1);
                else if (sinceLoad > 8 * 3600 * 1000) m = Math.min(m, 2);
            }
            savePetMood(m);
            localStorage.setItem('pet.lastLoad', String(now));
        }

        // 投喂限额
        function tryFeedPet() {
            const today = new Date().toISOString().slice(0, 10);
            const date = localStorage.getItem('pet.feedDate');
            let count = parseInt(localStorage.getItem('pet.feedCount'), 10);
            if (date !== today || !Number.isFinite(count)) { count = 0; }
            if (count >= 3) return false;
            count += 1;
            localStorage.setItem('pet.feedDate', today);
            localStorage.setItem('pet.feedCount', String(count));
            changePetMood(+1);
            touchPetInteract();
            return true;
        }

        // 显示/隐藏（hover 时显示 心情 + 名字）
        let moodHideTimer = null;
        function showPetMoodBar() {
            const box = document.getElementById('pet-mood');
            const nameBox = document.getElementById('pet-name');
            if (!box) return;
            renderPetMood();
            if (nameBox) {
                nameBox.textContent = localStorage.getItem('pet.name') || '';
                nameBox.classList.add('show');
            }
            clearTimeout(moodHideTimer);
            box.classList.add('show');
        }
        function hidePetMoodBar() {
            const box = document.getElementById('pet-mood');
            const nameBox = document.getElementById('pet-name');
            if (!box) return;
            clearTimeout(moodHideTimer);
            moodHideTimer = setTimeout(() => {
                box.classList.remove('show');
                if (nameBox) nameBox.classList.remove('show');
            }, 200);
        }

        // ===== 宠物选择引导 =====
        function showPetOnboard() {
            const box = document.getElementById('pet-onboard');
            const pet = document.getElementById('pet');
            if (!box) return;
            box.querySelectorAll('.pet-onboard-svg').forEach(el => {
                el.innerHTML = renderPet(el.dataset.type, 'idle');
            });
            document.getElementById('pet-onboard-name').value = '';
            refreshOnboardGate();
            if (pet) pet.style.visibility = 'hidden';
            box.classList.remove('hidden'); box.classList.add('flex');
            setTimeout(() => document.getElementById('pet-onboard-name').focus(), 50);
        }
        function hidePetOnboard() {
            const box = document.getElementById('pet-onboard');
            const pet = document.getElementById('pet');
            if (!box) return;
            box.classList.add('hidden'); box.classList.remove('flex');
            if (pet) pet.style.visibility = '';
        }
        function refreshOnboardGate() {
            const name = document.getElementById('pet-onboard-name').value.trim();
            const ready = !!name;
            document.querySelectorAll('#pet-onboard .pet-onboard-card').forEach(c => { c.disabled = !ready; });
            const hint = document.getElementById('pet-onboard-hint');
            if (hint) hint.innerText = ready ? '选择你的伙伴' : '填写名字后选择动物';
        }
        function confirmPetOnboard(type) {
            const name = document.getElementById('pet-onboard-name').value.trim();
            if (!name || !type) return;
            localStorage.setItem('pet.type', type);
            localStorage.setItem('pet.name', name);
            setPetActiveFlag(true); // 首次初始化：默认活跃模式
            applyPetTypeToUI(type);
            // 首次初始化：pet 之前被 display:none 隐藏，现在显示并落位到右上角（贴近呼吸式按钮）
            const petEl = document.getElementById('pet');
            if (petEl) {
                petEl.style.display = '';
                const corner = getPetInitialCorner();
                if (corner) {
                    petEl.style.transition = 'none';
                    pinPetTo(corner.x, corner.y);
                    void petEl.offsetHeight;
                    petEl.style.transition = '';
                }
            }
            hidePetOnboard();
            startPetRoam();
            triggerOneShotState('happy', 2000); // 首次出场：happy 2s
            refreshPetNavUI();
            maybeShowPetHint(); // 初始化完成后自动隐藏提示条
        }

        // 初始化
        (function initPet() {
            const el = document.getElementById('pet');
            if (!el) return;

            // 单击宠物 → 随机播放一个小动作（1 秒）+ 刷新交互时间 + 显示心情条
            const PET_SMALL_ACTIONS = ['happy', 'celebrate'];
            let petClickTimer = null;
            el.addEventListener('click', () => {
                if (el._suppressClick) return; // 拖拽刚结束
                if (petLoadSleep) { playWakeSequence(); return; } // 加载睡眠 → 点击唤醒
                if (petFsm.state === 'sleeping') { fsmWakeFromSleep(); return; } // FSM 睡眠 → 点击唤醒
                if (petClickTimer) return;
                petClickTimer = setTimeout(() => {
                    petClickTimer = null;
                    touchPetInteract();
                    showPetMoodBar();
                    if (loadPetMood() <= 2) return; // 心情低时屏蔽事件
                    const pick = PET_SMALL_ACTIONS[Math.floor(Math.random() * PET_SMALL_ACTIONS.length)];
                    triggerOneShotState(pick, 1000);
                }, 240);
            });
            // 双击 → 投喂；超出每日 3 次则摇头拒绝
            el.addEventListener('dblclick', () => {
                if (el._suppressClick) return;
                if (petLoadSleep) return; // 加载睡眠：屏蔽喂食
                if (petClickTimer) { clearTimeout(petClickTimer); petClickTimer = null; }
                showPetMoodBar();
                const ok = tryFeedPet();
                if (ok) triggerFeedAnimation();
                else triggerRefuseAnimation();
            });
            // hover 显示心情条；加载睡眠 / FSM 睡眠 均不弹（保持沉浸）
            el.addEventListener('mouseenter', () => {
                if (petLoadSleep) return;
                if (petFsm.state === 'sleeping') return;
                showPetMoodBar();
            });
            el.addEventListener('mouseleave', hidePetMoodBar);

            // 拖拽
            attachPetDrag();
            const savedPos = loadPetPos();
            if (isPetInitialized()) {
                // 初始落位：关闭 transition，避免页面加载后从 (0,0) 滑动过来
                el.style.transition = 'none';
                if (savedPos) {
                    pinPetTo(savedPos.x, savedPos.y);
                } else {
                    // 没有历史位置：落到右上角默认位置
                    const corner = getPetInitialCorner();
                    if (corner) pinPetTo(corner.x, corner.y);
                }
                void el.offsetHeight;
                el.style.transition = '';
            }

            // 活跃模式：刷新后恢复；未初始化时保持静止，由右上角呼吸式按钮引导用户
            updatePetActiveButton();
            if (isPetInitialized()) {
                if (isPetActive()) {
                    setTimeout(enterActiveMode, 0);
                } else {
                    setTimeout(startPetRoam, 0);
                }
            }

            // 禁用宠物上的右键菜单（macOS 触控板两指点按易误触，旧版会 unpin 把宠物送到 (0,0) 左上角）
            el.addEventListener('contextmenu', e => e.preventDefault());

            // 引导交互：先填名字 → 解锁动物按钮 → 点击动物完成初始化
            document.querySelectorAll('#pet-onboard .pet-onboard-card').forEach(c => {
                c.addEventListener('click', () => {
                    if (c.disabled) return;
                    confirmPetOnboard(c.dataset.onboardPet);
                });
            });
            document.getElementById('pet-onboard-name').addEventListener('input', refreshOnboardGate);

            // 启动时结算心情 + 同步基础动画
            settlePetMoodOnLoad();
            renderPetMood();
            applyMoodToBaseState();

            // 首次启动或缺失数据 → 完全不渲染宠物，仅由右上角宠物按钮 + 下拉菜单里的"初始化"双重呼吸灯引导用户
            const savedType = localStorage.getItem('pet.type');
            const savedName = localStorage.getItem('pet.name');
            if (savedType && savedName) {
                applyPetTypeToUI(savedType);
            } else {
                el.style.display = 'none';
            }
            hidePetOnboard();

            // 恢复「显示/隐藏」偏好
            if (isPetHidden()) setPetHiddenState(true);

            // 同步右上角下拉菜单的 UI（含呼吸提示）+ 首次引导横条
            refreshPetNavUI();
            maybeShowPetHint();

            // 页面关闭/刷新前保存宠物当前位置（含 FSM 游走途中的位置，transition 目标值已写入 style）
            // 用 pagehide（现代浏览器推荐，beforeunload 在 Chrome 已不可靠且会阻塞 bfcache）
            window.addEventListener('pagehide', () => {
                if (!isPetInitialized()) return;
                const petEl = document.getElementById('pet');
                if (!petEl) return;
                const x = parseFloat(petEl.style.left);
                const y = parseFloat(petEl.style.top);
                if (isFinite(x) && isFinite(y)) savePetPos(x, y);
            });
        })();

        // 宠物朝向鼠标：静止时跟随鼠标 X 方向翻转
        (function petFaceMouse() {
            let pendingX = null;
            let rafId = null;
            function apply() {
                rafId = null;
                const el = document.getElementById('pet');
                if (!el || pendingX === null) return;
                if (petLoadSleep) return;
                if (petActiveStates && petActiveStates.has('dragged')) return;
                if (typeof petFsm !== 'undefined' && (petFsm.state === 'walking' || petFsm.state === 'sleeping' || petFsm.state === 'yawning')) return;
                // 视觉睡姿（含 sitting 复用 sleeping 素材、petActiveStates 驱动的入睡）也不朝鼠标翻
                if (el.dataset.state === 'sleeping' || el.dataset.state === 'yawning') return;
                if (petActiveStates && (petActiveStates.has('sleeping') || petActiveStates.has('yawning'))) return;
                if (performance.now() < petFacingLockedUntil) return;
                const r = el.getBoundingClientRect();
                if (r.width === 0) return;
                const cx = r.left + r.width / 2;
                const dx = pendingX - cx;
                if (Math.abs(dx) < 6) return; // 死区，避免紧贴中线时反复翻转
                el.classList.toggle('facing-left', dx < 0);
            }
            document.addEventListener('mousemove', (e) => {
                pendingX = e.clientX;
                if (rafId === null) rafId = requestAnimationFrame(apply);
            }, { passive: true });
        })();

        window.onload = () => {
            renderGroupTabs();
            renderTodos();
            applyPanelVisibility(); // 恢复面板开关状态，内部会触发 calcAndRenderBookmarks
            // ResizeObserver：快捷方式面板宽度变化时重新计算书签布局
            const shortcutsPanelEl = document.getElementById('panel-shortcuts');
            if (shortcutsPanelEl && window.ResizeObserver) {
                const ro = new ResizeObserver(() => calcAndRenderBookmarks());
                ro.observe(shortcutsPanelEl);
            }
            const mode = localStorage.getItem('workbench_bg_mode_v8') || 'url';
            setActiveBgModeUI(mode);

            const savedUrl = localStorage.getItem('workbench_bg_url_v8');
            if(savedUrl) document.getElementById('bg-url').value = savedUrl;

            if(mode === 'local') {
                const savedLocal = localStorage.getItem('workbench_bg_local_v8');
                if(savedLocal) applyBgImageUrl(savedLocal);
            } else if (mode === 'presets') {
                const savedPreset = localStorage.getItem('workbench_bg_preset_v8');
                if(savedPreset) applyBgImageUrl(savedPreset);
            } else {
                if(savedUrl) applyBgImageUrl(savedUrl);
            }

            // 加载睡眠检测：放在 onload 末尾 + try/catch 包裹，确保即使抛错也不影响面板渲染
            try {
                if (localStorage.getItem('pet.type') && localStorage.getItem('pet.name') && shouldLoadSleep()) {
                    enterLoadSleep();
                }
            } catch(e) { console.warn('[pet] load-sleep init failed', e); }
        };
    </script>
