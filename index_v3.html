<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人工作台</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #000;
            width: 100vw;
            height: 100vh;
        }

        /* 极致毛玻璃效果 - 增加了饱和度和模糊度，更有苹果味 */
        .apple-glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.4);
        }

        /* 背景层 */
        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2560');
            background-size: cover; 
            background-position: center;
            z-index: -2; 
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(20px);
        }
        .modal.active { display: flex; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .hover-lift { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-8px); filter: brightness(1.2); }

        /* 番茄钟时长按钮 */
        .pomo-dur-btn { opacity: 0.5; }
        .pomo-dur-btn.active { opacity: 1; background: rgba(255,255,255,0.15); }

        /* 宠物 PNG 容器 */
        .pet-wrap { width: 120px; height: 120px; display: inline-block; cursor: pointer; user-select: none; position: relative; --flip: 1; }
        .pet-img { width: 100%; height: 100%; display: block; pointer-events: none; user-select: none; opacity: 1; transition: opacity 0.22s ease; background: transparent; -webkit-user-drag: none; object-fit: contain; transform: scaleX(var(--flip)); }
        .pet-wrap.facing-left { --flip: -1; }

        /* 各状态 keyframe 动画 —— 动画里复用 scaleX(var(--flip)) 以同时兼容镜像 */
        @keyframes petStateIdle {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            50% { transform: translateY(-4px) scaleX(var(--flip)); }
        }
        @keyframes petStateHappy {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            50% { transform: translateY(-8px) scaleX(var(--flip)); }
        }
        @keyframes petStateCelebrate {
            0%, 100% { transform: translateY(0) scaleX(var(--flip)); }
            40% { transform: translateY(-16px) scaleX(var(--flip)); }
            60% { transform: translateY(-12px) scaleX(var(--flip)); }
        }
        @keyframes petStateSad {
            0%, 100% { transform: translateX(0) scaleX(var(--flip)); }
            25% { transform: translateX(-2px) scaleX(var(--flip)); }
            75% { transform: translateX(2px) scaleX(var(--flip)); }
        }
        @keyframes petStateSleeping {
            /* 呼吸感：scale 0.97 ↔ 1.0，周期 4s */
            0%, 100% { transform: scale(1) scaleX(var(--flip)); }
            50% { transform: scale(0.97) scaleX(var(--flip)); }
        }
        .pet-wrap.state-idle      .pet-img { animation: petStateIdle 3s ease-in-out infinite; }
        .pet-wrap.state-happy     .pet-img { animation: petStateHappy 0.5s ease-in-out 2; }
        .pet-wrap.state-celebrate .pet-img { animation: petStateCelebrate 0.5s ease-in-out 3; }
        .pet-wrap.state-sad       .pet-img { animation: petStateSad 4s ease-in-out infinite; }
        .pet-wrap.state-sleeping  .pet-img { animation: petStateSleeping 4s ease-in-out infinite; }
        .pet-wrap.state-yawning   .pet-img { animation: petStateIdle 3s ease-in-out infinite; }
        /* dragged 状态无 keyframe —— 位置由 JS pointermove 设置 left/top 直接跟随光标 */

        /* 投喂食物图标 */
        .pet-food { position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%); width: 18px; height: 18px; opacity: 0; pointer-events: none; z-index: 4; }
        .pet-food.show { animation: petFoodPop 1.5s ease-out forwards; }
        @keyframes petFoodPop {
            0% { opacity: 0; transform: translate(-50%, 8px) scale(0.6); }
            20% { opacity: 1; transform: translate(-50%, 0) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -2px) scale(0.95); }
            100% { opacity: 0; transform: translate(-50%, -10px) scale(0.4); }
        }

        /* 拖拽 */
        .pet-wrap.dragging { transition: none !important; cursor: grabbing; z-index: 9999; }
        .pet-wrap.pinned { position: fixed !important; z-index: 9998; }
        .pet-wrap { transition: left 4.8s cubic-bezier(0.45, 0, 0.25, 1), top 4.8s cubic-bezier(0.45, 0, 0.25, 1); }
        .pet-onboard-card.selected { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
        .pet-onboard-svg img { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* 心情指示条 */
        .pet-mood { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 5; }
        .pet-mood.show { opacity: 1; }
        .pet-mood .mood-heart { width: 12px; height: 12px; color: #f472b6; }
        .pet-mood .mood-heart.empty { color: rgba(244, 114, 182, 0.25); }

        /* 心情指示装饰（星星 / 乌云） */
        .pet-mood-fx { position: absolute; left: 50%; top: -6px; transform: translateX(-50%); pointer-events: none; opacity: 0; transition: opacity 0.8s ease; z-index: 4; width: 80px; height: 40px; }
        .pet-mood-fx.show { opacity: 1; }
        .pet-mood-fx .fx-star { position: absolute; width: 12px; height: 12px; color: #fde68a; opacity: 0; animation: fxStar 2.4s ease-in-out infinite; }
        .pet-mood-fx .fx-star:nth-child(1) { left: 8px;  top: 8px;  animation-delay: 0s; }
        .pet-mood-fx .fx-star:nth-child(2) { left: 34px; top: 0px;  animation-delay: 0.7s; }
        .pet-mood-fx .fx-star:nth-child(3) { left: 60px; top: 10px; animation-delay: 1.4s; }
        @keyframes fxStar {
            0% { opacity: 0; transform: scale(0.4) translateY(4px); }
            30% { opacity: 1; transform: scale(1) translateY(-2px); }
            70% { opacity: 1; transform: scale(1) translateY(-6px); }
            100% { opacity: 0; transform: scale(0.6) translateY(-12px); }
        }
        .pet-mood-fx .fx-cloud { position: absolute; left: 50%; top: 4px; transform: translateX(-50%); width: 36px; height: 22px; color: rgba(180, 200, 220, 0.85); animation: fxCloudFloat 4.5s ease-in-out infinite; }
        @keyframes fxCloudFloat {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-46%) translateY(-3px); }
        }
        .pet-mood-fx .fx-drop { position: absolute; top: 22px; width: 3px; height: 6px; border-radius: 2px; background: rgba(140, 170, 200, 0.85); opacity: 0; animation: fxDrop 1.6s ease-in infinite; }
        .pet-mood-fx .fx-drop:nth-child(2) { left: calc(50% - 8px); animation-delay: 0s; }
        .pet-mood-fx .fx-drop:nth-child(3) { left: calc(50% + 0px); animation-delay: 0.5s; }
        .pet-mood-fx .fx-drop:nth-child(4) { left: calc(50% + 8px); animation-delay: 1.0s; }
        @keyframes fxDrop {
            0% { opacity: 0; transform: translateY(0); }
            25% { opacity: 1; }
            100% { opacity: 0; transform: translateY(14px); }
        }

        /* 睡眠 Z 指示 */
        .pet-zz { position: absolute; top: -8px; right: 8px; font-size: 14px; font-weight: 700; color: rgba(180,200,220,0.85); opacity: 0; transition: opacity 0.6s ease; pointer-events: none; z-index: 4; letter-spacing: 1px; }
        .pet-zz.show { opacity: 1; animation: zzFloat 2.4s ease-in-out infinite; }
        @keyframes zzFloat {
            0% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(-6px); opacity: 1; }
            100% { transform: translateY(-12px); opacity: 0; }
        }

        /* 富文本工具栏 */
        .toolbar-btn {
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            opacity: 0.5;
        }
        .toolbar-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
        .toolbar-btn.active {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
        }
        .rich-editor {
            flex: 1;
            outline: none;
            overflow-y: auto;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        /* 分组标签栏 */
        .group-tab {
            padding: 0.4rem 0.9rem;
            border-radius: 0.5rem;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .group-tab:hover { opacity: 0.65; background: rgba(255,255,255,0.08); }
        .group-tab.active { opacity: 1; background: rgba(255,255,255,0.15); }
        .rich-editor:empty:before {
            content: attr(placeholder);
            opacity: 0.2;
        }

        /* 页面载入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.02); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0px); }
        }
        .animate-page { animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        /* 搜索框美化 */
        .search-container {
            position: relative;
        }
        .engine-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 0.75rem;
            width: 10rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 60;
        }
        .engine-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .engine-option {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1.5rem;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: background 0.2s;
        }
        .engine-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 统一输入框与按钮样式 */
        input, select, textarea {
            transition: all 0.3s ease;
        }
        
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 自定义 Todo 输入框样式 */
        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .apple-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            outline: none;
            width: 100%;
        }
        .apple-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        select.apple-input {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            color: white;
        }
        select.apple-input option {
            background: #1c1c2e;
            color: white;
        }

        /* 等比缩放容器：固定设计尺寸 1920×1080，由 JS 负责 scale */
        #main-container {
            width: 1920px;
            height: 1080px;
            transform-origin: center center;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="text-white animate-page">

    <div class="h-screen w-full flex items-center justify-center relative overflow-hidden">
        <!-- 背景层 -->
        <div id="bg-overlay"></div>
        <div class="fixed inset-0 bg-black/10 z-[-1]"></div>

        <!-- 主内容容器：固定 1440×900，由 JS 等比缩放 -->
        <div id="main-container" class="flex flex-col p-12 relative z-10">

            <!-- 顶部：设置按钮 -->
            <div class="flex justify-end items-start h-20">
                <div class="flex gap-4">
                    <!-- 番茄钟 -->
                    <div class="relative group/pomo">
                        <button id="pomodoro-btn" class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all flex items-center justify-center" title="番茄钟"><i data-lucide="timer" class="w-6 h-6"></i></button>
                        <div id="pomodoro-panel" class="absolute right-0 top-full mt-3 w-72 apple-glass rounded-[1.8rem] p-5 z-50 opacity-0 invisible group-hover/pomo:opacity-100 group-hover/pomo:visible transition-all duration-500 transform translate-y-2 group-hover/pomo:translate-y-0">
                            <div class="text-[10px] opacity-40 font-black tracking-[0.3em] uppercase mb-4">番茄钟</div>
                            <!-- 配置区（未运行时显示） -->
                            <div id="pomodoro-setup">
                                <div class="flex items-center gap-2 mb-3">
                                    <button type="button" data-pomo-dur="25" class="pomo-dur-btn flex-1 px-3 py-2 rounded-xl text-xs font-bold tracking-widest uppercase hover:bg-white/10 transition-colors active">25</button>
                                    <button type="button" data-pomo-dur="30" class="pomo-dur-btn flex-1 px-3 py-2 rounded-xl text-xs font-bold tracking-widest uppercase hover:bg-white/10 transition-colors">30</button>
                                    <button type="button" data-pomo-dur="45" class="pomo-dur-btn flex-1 px-3 py-2 rounded-xl text-xs font-bold tracking-widest uppercase hover:bg-white/10 transition-colors">45</button>
                                </div>
                                <div class="flex items-center gap-2 mb-4">
                                    <input id="pomodoro-custom" type="number" min="1" max="180" placeholder="自定义 (分钟)" class="flex-1 bg-white/5 rounded-xl px-3 py-2 text-xs outline-none placeholder:opacity-40 focus:bg-white/10 transition-colors" />
                                </div>
                                <button id="pomodoro-start" onclick="startPomodoro()" class="w-full py-3 rounded-2xl bg-white/15 hover:bg-white/25 transition-colors text-xs font-black tracking-[0.3em] uppercase">开始</button>
                            </div>
                            <!-- 运行区（运行中显示） -->
                            <div id="pomodoro-run" class="hidden text-center">
                                <div id="pomodoro-phase" class="text-[10px] opacity-60 tracking-[0.3em] uppercase font-black mb-2">专注 · 第 1 轮</div>
                                <div id="pomodoro-time" class="text-5xl font-black tracking-wider mb-4">25:00</div>
                                <div class="flex gap-2">
                                    <button id="pomodoro-pause" onclick="togglePomodoroPause()" class="flex-1 py-2 rounded-xl text-[10px] font-black tracking-[0.2em] uppercase bg-white/5 hover:bg-white/15 transition-colors">暂停</button>
                                    <button onclick="skipPomodoro()" class="flex-1 py-2 rounded-xl text-[10px] font-black tracking-[0.2em] uppercase bg-white/5 hover:bg-white/15 transition-colors">跳过</button>
                                    <button onclick="stopPomodoro()" class="flex-1 py-2 rounded-xl text-[10px] font-black tracking-[0.2em] uppercase bg-white/5 hover:bg-white/15 transition-colors">停止</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 音乐下拉菜单 -->
                <div class="relative group/audio">
                    <button id="audio-btn" class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all flex items-center justify-center">
                        <i id="audio-main-icon" data-lucide="music" class="w-6 h-6"></i>
                    </button>
                    <!-- 下拉列表 -->
                    <div class="absolute right-0 mt-3 py-3 w-56 apple-glass rounded-[1.8rem] opacity-0 invisible group-hover/audio:opacity-100 group-hover/audio:visible transition-all duration-500 z-50 transform translate-y-2 group-hover/audio:translate-y-0 max-h-[70vh] overflow-y-auto no-scrollbar">
                        <div class="px-6 py-2 mb-1 text-[9px] opacity-30 font-black tracking-[0.3em] uppercase">Soundscape</div>
                        <button onclick="changeAudio('none')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="volume-x" class="w-4 h-4 opacity-50"></i> Mute
                        </button>
                        <button onclick="changeAudio('rain')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="cloud-rain" class="w-4 h-4 opacity-50"></i> Rainy Day
                        </button>
                        <!-- 用户自定义 -->
                        <div class="px-6 pt-3 pb-1 mt-2 border-t border-white/10 text-[9px] opacity-30 font-black tracking-[0.3em] uppercase">My Tracks</div>
                        <div id="custom-audio-list"></div>
                        <button onclick="addCustomAudioUrl(event)" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="link" class="w-4 h-4 opacity-50"></i> Add URL
                        </button>
                        <button onclick="document.getElementById('custom-audio-file').click()" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center gap-3">
                            <i data-lucide="upload" class="w-4 h-4 opacity-50"></i> Upload File
                        </button>
                        <input id="custom-audio-file" type="file" accept="audio/*" class="hidden" onchange="addCustomAudioFile(event)" />
                    </div>
                </div>
                
                <button onclick="toggleModal('settings-modal')" class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all">
                    <i data-lucide="image" class="w-6 h-6"></i>
                </button>
                <!-- 面板开关下拉 -->
                <div class="relative group/panels">
                    <button class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all flex items-center justify-center">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    </button>
                    <div class="absolute right-0 mt-3 py-3 w-52 apple-glass rounded-[1.8rem] opacity-0 invisible group-hover/panels:opacity-100 group-hover/panels:visible transition-all duration-500 z-50 transform translate-y-2 group-hover/panels:translate-y-0">
                        <div class="px-6 py-2 mb-1 text-[9px] opacity-30 font-black tracking-[0.3em] uppercase">Panels</div>
                        <button onclick="togglePanel('shortcuts')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center justify-between">
                            <span class="flex items-center gap-3"><i data-lucide="layout-grid" class="w-4 h-4 opacity-50"></i> Shortcuts</span>
                            <i id="dd-check-shortcuts" data-lucide="check" class="w-3.5 h-3.5 transition-opacity"></i>
                        </button>
                        <button onclick="togglePanel('note')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center justify-between">
                            <span class="flex items-center gap-3"><i data-lucide="file-text" class="w-4 h-4 opacity-50"></i> Notes</span>
                            <i id="dd-check-note" data-lucide="check" class="w-3.5 h-3.5 transition-opacity"></i>
                        </button>
                        <button onclick="togglePanel('todo')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center justify-between">
                            <span class="flex items-center gap-3"><i data-lucide="check-square" class="w-4 h-4 opacity-50"></i> Tasks</span>
                            <i id="dd-check-todo" data-lucide="check" class="w-3.5 h-3.5 transition-opacity"></i>
                        </button>
                        <button onclick="togglePanel('pet')" class="w-full text-left px-6 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white/10 transition-colors flex items-center justify-between">
                            <span class="flex items-center gap-3"><i data-lucide="heart" class="w-4 h-4 opacity-50"></i> Pet</span>
                            <i id="dd-check-pet" data-lucide="check" class="w-3.5 h-3.5 transition-opacity"></i>
                        </button>
                    </div>
                </div>
                <!-- 作者主页下拉 -->
                <div class="relative group/author">
                    <button class="apple-glass p-5 rounded-full hover:bg-white/30 transition-all flex items-center justify-center">
                        <i data-lucide="smile" class="w-6 h-6"></i>
                    </button>
                    <div class="absolute right-0 mt-3 py-3 w-56 apple-glass rounded-[1.8rem] opacity-0 invisible group-hover/author:opacity-100 group-hover/author:visible transition-all duration-500 z-50 transform translate-y-2 group-hover/author:translate-y-0">
                        <div id="author-dd-name" class="px-6 py-2 mb-1 text-[9px] opacity-30 font-black tracking-[0.3em] uppercase">作者主页</div>
                        <div id="author-links"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 中间：时钟、天气与搜索 -->
        <div class="flex flex-col items-center justify-center flex-1">
            <div class="w-full max-w-2xl flex flex-col items-center">

                <!-- 时间与天气容器 -->
                <div class="flex flex-col items-center mb-2 animate-page">
                    <div id="time" class="text-7xl lg:text-8xl font-extralight tracking-tighter mb-2">00:00</div>
                    <div class="flex items-center gap-6 mb-10">
                        <div id="date" class="text-xs lg:text-sm tracking-[0.5em] uppercase font-bold border-r border-white/20 pr-6 text-white">JAN 01, MONDAY</div>
                        <div id="weather" class="flex items-center gap-2 text-xs lg:text-sm tracking-[0.3em] uppercase font-bold text-white">
                            <span id="weather-temp">--°C</span>
                            <span id="weather-desc">加载中...</span>
                        </div>
                    </div>

                    <!-- 每日格言 -->
                    <div id="hitokoto-container" class="max-w-xl text-center px-4 mb-8 h-14 flex flex-col justify-center relative group/hitokoto">
                        <div class="absolute -top-1 left-full ml-2 flex items-center gap-1 opacity-0 group-hover/hitokoto:opacity-100 transition-opacity z-10">

                    <button onclick="toggleModal('todo-modal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[2rem] text-[10px] uppercase tracking-widest font-black opacity-50">取消</button>
                    <button onclick="confirmAddTodo()" class="flex-1 bg-white text-black font-black py-5 rounded-[2rem] text-[10px] uppercase tracking-widest">添加任务</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="apple-glass p-12 rounded-[4rem] max-w-md w-full relative">
            <button onclick="toggleModal('settings-modal')" class="absolute top-10 right-10 opacity-30 hover:opacity-100"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-light mb-10 tracking-tight">设置</h3>
            <div class="space-y-8">
                <div class="inline-flex rounded-2xl overflow-hidden border border-white/20 bg-white/5 p-1 w-full">
                    <button id="bg-mode-url" onclick="setBgMode('url')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">网络图片</button>
                    <button id="bg-mode-local" onclick="setBgMode('local')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">本地图片</button>
                    <button id="bg-mode-presets" onclick="setBgMode('presets')" class="flex-1 py-3 rounded-xl text-[10px] uppercase tracking-[0.35em] font-black opacity-70 hover:opacity-100 transition-all">预设风景</button>
                </div>

                <div id="bg-pane-url" class="space-y-4">
                    <input type="text" id="bg-url" class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 outline-none font-light" placeholder="图片链接 (https://...jpg/png/webp)">
                    <button onclick="applyBgFromUrl()" class="w-full bg-white text-black font-black py-5 rounded-[2.5rem]">应用网络壁纸</button>
                </div>

                <div id="bg-pane-local" class="space-y-4 hidden">
                    <input type="file" id="bg-file" accept="image/*" class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 outline-none font-light">
                    <button onclick="applyBgFromLocal()" class="w-full bg-white text-black font-black py-5 rounded-[2.5rem]">应用本地壁纸</button>
                    <p class="text-[10px] opacity-40 tracking-[0.25em] uppercase font-black">提示：本地图片会以数据形式保存在浏览器里</p>
                </div>

                <div id="bg-pane-presets" class="space-y-4 hidden">
                    <div class="grid grid-cols-2 gap-3" id="presets-grid">
                        <!-- 动态渲染预设图片 -->
                    </div>
                </div>

                <!-- 面板显示 -->
                <div class="space-y-4 pt-4 border-t border-white/10">
                    <div class="text-[9px] uppercase tracking-[0.3em] font-black opacity-30 ml-4">面板显示</div>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="toggle-shortcuts" onclick="togglePanel('shortcuts')" class="py-3 px-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] font-black border border-white/20 transition-all">快捷方式</button>
                        <button id="toggle-note" onclick="togglePanel('note')" class="py-3 px-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] font-black border border-white/20 transition-all">笔记</button>
                        <button id="toggle-todo" onclick="togglePanel('todo')" class="py-3 px-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] font-black border border-white/20 transition-all">待办</button>
                        <button id="toggle-pet" onclick="togglePanel('pet')" class="py-3 px-4 rounded-2xl text-[10px] uppercase tracking-[0.2em] font-black border border-white/20 transition-all">宠物</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ===== 作者配置 =====
        const AUTHOR_CONFIG = {
            name: '作者主页',
            links: [
                { label: '小红书', icon: 'heart', url: 'https://xhslink.com/m/4PoZVQp09DM' },
            ]
        };

        lucide.createIcons();

        // 等比缩放：始终以 1920×1080 为基准适配实际视口
        function scaleLayout() {
            const el = document.getElementById('main-container');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            el.style.transform = 'scale(' + scale + ')';
        }
        scaleLayout();
        window.addEventListener('resize', scaleLayout);

        // --- 快捷方式分组数据 ---
        function loadGroups() {
            const saved = localStorage.getItem('shortcuts.groups');
            if (saved) return JSON.parse(saved);

            // 从旧格式迁移，保留数据不丢失
            const old = localStorage.getItem('bookmarks_v7');
            if (old) {
                const migrated = [{ id: 'group-default', name: '默认', bookmarks: JSON.parse(old) }];
                localStorage.setItem('shortcuts.groups', JSON.stringify(migrated));
                return migrated;
            }

            // 首次默认分组
            return [
                {
                    id: 'group-work',
                    name: '工作',
                    bookmarks: [
                        { name: 'Github', url: 'https://github.com', icon: 'github' },
                        { name: 'ArchDaily', url: 'https://archdaily.com', icon: 'layout' }
                    ]
                },
                {
                    id: 'group-fun',
                    name: '娱乐',
                    bookmarks: [
                        { name: 'Bilibili', url: 'https://bilibili.com', icon: 'tv' },
                        { name: 'Pinterest', url: 'https://pinterest.com', icon: 'image' }
                    ]
                }
            ];
        }

        function saveGroups() {
            localStorage.setItem('shortcuts.groups', JSON.stringify(groups));
        }

        function getCurrentBookmarks() {
            const g = groups.find(g => g.id === currentGroupId);
            return g ? g.bookmarks : (groups[0]?.bookmarks || []);
        }

        let groups = loadGroups();
        let currentGroupId = groups[0]?.id || null;

        // 默认分组（工作/娱乐）只能重命名，不可删除
        const PROTECTED_GROUP_IDS = new Set(['group-work', 'group-fun']);
        function isGroupProtected(id) { return PROTECTED_GROUP_IDS.has(id); }

        // ===== 待办系统 =====
        const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

        function migrateTodos() {
            const saved = localStorage.getItem('todos.active');
            if (saved) { try { return JSON.parse(saved); } catch(e) {} }
            const old = JSON.parse(localStorage.getItem('todos_v7') || 'null');
            if (old && Array.isArray(old)) {
                return old.map(t => ({
                    id: 'td-' + (t.id || Date.now()),
                    text: t.text || '',
                    completed: !!t.completed,
                    priority: 'medium',
                    dueDate: null,
                    createdAt: typeof t.id === 'number' ? t.id : Date.now(),
                    completedAt: t.completed ? Date.now() : null
                }));
            }
            return [{ id: 'td-default', text: '开始设计第一稿', completed: false, priority: 'medium', dueDate: null, createdAt: Date.now(), completedAt: null }];
        }

        let todos = migrateTodos();
        let todoManualOrder = JSON.parse(localStorage.getItem('todos.manualOrder') || 'false');
        let completedSectionOpen = false;
        let currentTodoPriority = 'medium';
        let todoDragSrcId = null;

        // 书签网格：动态列数，每页 2 行；cols * 2 - 1 = 书签数（最后一格留给添加按钮）
        let currentCols = 4;
        let currentItemsPerPage = 7; // 初始值对应 4 列

        function getTotalPages(bms) {
            return Math.max(1, Math.ceil(bms.length / currentItemsPerPage));
        }

        // 每个分组独立记忆当前页，存入 localStorage
        let groupPages = JSON.parse(localStorage.getItem('shortcuts.pages')) || {};
        function savePages() { localStorage.setItem('shortcuts.pages', JSON.stringify(groupPages)); }
        function getCurrentPage() { return groupPages[currentGroupId] || 0; }
        function setCurrentPage(n) { groupPages[currentGroupId] = n; savePages(); }

        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');
            grid.style.gridTemplateColumns = `repeat(${currentCols}, 1fr)`;
            const page = getCurrentPage();
            const start = page * currentItemsPerPage;
            const end = start + currentItemsPerPage;
            const bms = getCurrentBookmarks();
            const pageItems = bms.slice(start, end);

            const totalPages = getTotalPages(bms);
            document.getElementById('page-indicator').innerText = `${page + 1}/${totalPages}`;

            let html = pageItems.map((s, index) => {
                const globalIndex = start + index;
                return `
                <div class="flex flex-col items-center gap-2 group relative">
                    <div class="absolute -top-2 -right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-all z-10">
                        <button onclick="editBookmark(${globalIndex})" class="bg-white/20 backdrop-blur-md rounded-full p-1.5 hover:bg-white/40"><i data-lucide="edit-2" class="w-3 h-3"></i></button>
                        <button onclick="deleteBookmark(${globalIndex})" class="bg-red-500/60 backdrop-blur-md rounded-full p-1.5 hover:bg-red-600/80"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>
                    <a href="${s.url}" target="_blank" class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center hover-lift group-hover:bg-white/30 shadow-sm">
                        <i data-lucide="${s.icon || 'link-2'}" class="w-6 h-6 opacity-70"></i>
                    </a>
                    <span class="text-[12px] opacity-30 group-hover:opacity-100 tracking-[0.1em] font-bold uppercase truncate w-full text-center transition-opacity">${s.name}</span>
                </div>
            `}).join('');

            // 当前页未满，或当前页是最后一页（始终保留添加入口）
            const isLastPage = (page + 1) >= totalPages;
            if (pageItems.length < currentItemsPerPage || isLastPage) {
                html += `
                    <button onclick="openAddModal()" class="flex flex-col items-center gap-2 group">
                        <div class="apple-glass w-[84px] h-[84px] mx-auto rounded-[1.2rem] flex items-center justify-center border-dashed border-white/10 hover:bg-white/10 transition-all">
                            <i data-lucide="plus" class="w-5 h-5 opacity-20 group-hover:opacity-50"></i>
                        </div>
                        <span class="text-[8px] opacity-10 tracking-[0.1em] uppercase font-bold text-center group-hover:opacity-30">Add</span>
                    </button>
                `;
            }

            grid.innerHTML = html;
            lucide.createIcons();
        }

        // 根据快捷方式面板宽度动态计算列数与每页数，宽度变化时重置到第一页
        function calcAndRenderBookmarks() {
            const panel = document.getElementById('panel-shortcuts');
            if (!panel || panel.classList.contains('hidden')) return;
            const wrapper = document.getElementById('bookmarks-grid-wrapper');
            if (!wrapper) return;
            const availableWidth = wrapper.clientWidth;
            const newCols = Math.max(1, Math.floor(availableWidth / 100));
            const newPerPage = newCols * 2 - 1;
            if (newCols !== currentCols || newPerPage !== currentItemsPerPage) {
                currentCols = newCols;
                currentItemsPerPage = newPerPage;
                setCurrentPage(0);
            }
            renderBookmarks();
        }

        let editingIndex = -1;

        function populateBmGroupSelect(selectedId) {
            const sel = document.getElementById('bm-group');
            sel.innerHTML = groups.map(g =>
                `<option value="${g.id}"${g.id === selectedId ? ' selected' : ''}>${g.name}</option>`
            ).join('');
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('bm-modal-title').innerText = "添加快捷方式";
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = '';
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function editBookmark(index) {
            editingIndex = index;
            const bm = getCurrentBookmarks()[index];
            document.getElementById('bm-modal-title').innerText = "编辑快捷方式";
            document.getElementById('bm-name').value = bm.name;
            document.getElementById('bm-url').value = bm.url;
            populateBmGroupSelect(currentGroupId);
            toggleModal('bookmark-modal');
        }

        function closeBookmarkModal() {
            toggleModal('bookmark-modal');
        }

        function saveBookmark() {
            const name = document.getElementById('bm-name').value.trim();
            const url = document.getElementById('bm-url').value.trim();
            const targetGroupId = document.getElementById('bm-group').value;
            if (!name || !url) return;
            const formattedUrl = url.startsWith('http') ? url : 'https://' + url;
            const targetGroup = groups.find(g => g.id === targetGroupId);
            if (!targetGroup) return;

            if (editingIndex > -1) {
                const srcBms = getCurrentBookmarks();
                const existing = srcBms[editingIndex];
                if (targetGroupId !== currentGroupId) {
                    // 跨分组移动：从源组删除，加入目标组
                    srcBms.splice(editingIndex, 1);
                    targetGroup.bookmarks.push({ ...existing, name, url: formattedUrl });
                    // 源组页码越界修正
                    const totalPages = getTotalPages(srcBms);
                    const page = getCurrentPage();
                    if (page >= totalPages && page > 0) setCurrentPage(page - 1);
                    currentGroupId = targetGroupId;
                } else {
                    srcBms[editingIndex] = { ...existing, name, url: formattedUrl };
                }
            } else {
                targetGroup.bookmarks.push({ name, url: formattedUrl, icon: 'globe' });
                if (targetGroupId !== currentGroupId) currentGroupId = targetGroupId;
            }

            saveGroups();
            renderGroupTabs();
            renderBookmarks();
            closeBookmarkModal();
        }

        function deleteBookmark(index) {
            const bms = getCurrentBookmarks();
            bms.splice(index, 1);
            saveGroups();
            const totalPages = getTotalPages(bms);
            const page = getCurrentPage();
            if (page >= totalPages && page > 0) setCurrentPage(page - 1);
            renderBookmarks();
        }

        function prevPage() {
            const page = getCurrentPage();
            if (page > 0) { setCurrentPage(page - 1); renderBookmarks(); }
        }

        function nextPage() {
            const page = getCurrentPage();
            const totalPages = getTotalPages(getCurrentBookmarks());
            if (page < totalPages - 1) { setCurrentPage(page + 1); renderBookmarks(); }
        }

        // ===== 分组标签栏 =====
        function renderGroupTabs() {
            const container = document.getElementById('group-tabs');
            let html = groups.map(g => {
                const active = g.id === currentGroupId ? ' active' : '';
                return `<button class="group-tab${active}" onclick="switchGroup('${g.id}')" oncontextmenu="showGroupCtxMenu(event,'${g.id}')" data-gid="${g.id}">${g.name}</button>`;
            }).join('');
            html += `<button onclick="openNewGroupModal()" class="ml-auto flex-shrink-0 opacity-30 hover:opacity-70 transition-opacity p-1 rounded-lg hover:bg-white/10" title="新建分组"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function switchGroup(id) {
            currentGroupId = id;
            renderGroupTabs();
            renderBookmarks();
        }

        // ===== 新建 / 重命名分组 =====
        let groupModalMode = 'create';
        let ctxGroupId = null;

        function openNewGroupModal() {
            groupModalMode = 'create';
            document.getElementById('group-modal-title').innerText = '新建分组';
            document.getElementById('group-name-input').value = '';
            toggleModal('group-name-modal');
            setTimeout(() => document.getElementById('group-name-input').focus(), 100);
        }

        function openRenameGroupModal() {
            hideGroupCtxMenu();
            groupModalMode = 'rename';
            document.getElementById('group-modal-title').innerText = '重命名分组';
            const g = groups.find(g => g.id === ctxGroupId);
            document.getElementById('group-name-input').value = g ? g.name : '';
            toggleModal('group-name-modal');
            setTimeout(() => document.getElementById('group-name-input').focus(), 100);
        }

        function confirmGroupName() {
            const name = document.getElementById('group-name-input').value.trim();
            if (!name) return;
            if (groupModalMode === 'create') {
                const id = 'group-' + Date.now();
                groups.push({ id, name, bookmarks: [] });
                saveGroups();
                switchGroup(id);
            } else {
                const g = groups.find(g => g.id === ctxGroupId);
                if (g) { g.name = name; saveGroups(); renderGroupTabs(); }
            }
            toggleModal('group-name-modal');
        }

        // ===== 右键 / 长按菜单 =====
        function showGroupCtxMenu(e, groupId, refEl) {
            if (e) e.preventDefault();
            ctxGroupId = groupId;
            const menu = document.getElementById('group-ctx-menu');
            const canDelete = groups.length > 1 && !isGroupProtected(groupId);
            document.getElementById('ctx-delete-btn').style.display = canDelete ? '' : 'none';
            menu.classList.remove('hidden');
            const x = e ? e.clientX : refEl.getBoundingClientRect().left;
            const y = e ? e.clientY : refEl.getBoundingClientRect().bottom + 4;
            menu.style.left = Math.min(x, window.innerWidth - 150) + 'px';
            menu.style.top = (y + 4) + 'px';
        }

        function hideGroupCtxMenu() {
            document.getElementById('group-ctx-menu').classList.add('hidden');
        }

        function confirmDeleteGroup() {
            hideGroupCtxMenu();
            if (groups.length <= 1 || isGroupProtected(ctxGroupId)) return;
            const grp = groups.find(g => g.id === ctxGroupId);
            if (!grp) return;

            document.getElementById('del-group-title').innerText = `删除「${grp.name}」`;
            const moveSection = document.getElementById('del-group-move-section');
            const targetSel = document.getElementById('del-group-target');

            if (grp.bookmarks.length > 0) {
                document.getElementById('del-group-msg').innerText =
                    `该分组内有 ${grp.bookmarks.length} 个书签，删除后无法恢复。可将书签保留到其他分组。`;
                targetSel.innerHTML = `<option value="">不保留书签</option>` +
                    groups.filter(g => g.id !== ctxGroupId)
                          .map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                moveSection.classList.remove('hidden');
            } else {
                document.getElementById('del-group-msg').innerText =
                    `确认删除分组「${grp.name}」？此操作不可撤销。`;
                moveSection.classList.add('hidden');
            }
            toggleModal('delete-group-modal');
        }

        function executeDeleteGroup() {
            const targetId = document.getElementById('del-group-target').value;
            const grp = groups.find(g => g.id === ctxGroupId);
            if (grp && targetId) {
                const targetGroup = groups.find(g => g.id === targetId);
                if (targetGroup) targetGroup.bookmarks.push(...grp.bookmarks);
            }
            groups = groups.filter(g => g.id !== ctxGroupId);
            delete groupPages[ctxGroupId];
            saveGroups(); savePages();
            if (currentGroupId === ctxGroupId) currentGroupId = groups[0].id;
            toggleModal('delete-group-modal');
            renderGroupTabs();
            renderBookmarks();
        }

        function saveTodos() { localStorage.setItem('todos.active', JSON.stringify(todos)); }

        function archiveCompleted(todo) {
            let arc = JSON.parse(localStorage.getItem('todos.completed') || '[]');
            arc = arc.filter(a => a.id !== todo.id);
            arc.push({ id: todo.id, text: todo.text, priority: todo.priority, completedAt: todo.completedAt });
            const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
            arc = arc.filter(a => a.completedAt > cutoff);
            localStorage.setItem('todos.completed', JSON.stringify(arc));
        }

        function getSortedActive(active) {
            if (todoManualOrder) return active;
            return [...active].sort((a, b) => {
                const pd = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
                if (pd !== 0) return pd;
                if (!a.dueDate && !b.dueDate) return 0;
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            });
        }

        function isDueSoon(dueDate) {
            if (!dueDate) return false;
            const diff = new Date(dueDate) - new Date();
            return diff >= 0 && diff < 24 * 60 * 60 * 1000;
        }

        function buildTodoItemHtml(t, isDone) {
            const dueSoon = !isDone && isDueSoon(t.dueDate);
            const dotColor = { high: 'bg-red-500', medium: 'bg-amber-400', low: 'bg-sky-400' }[t.priority] || 'bg-white/30';
            const priorityDot = isDone ? '' : `<div class="w-1.5 h-1.5 rounded-full ${dotColor} flex-shrink-0 mt-[6px]"></div>`;
            const dueDateHtml = (t.dueDate && !isDone) ? `<span class="block text-[9px] font-black tracking-widest mt-0.5 ${dueSoon ? 'text-orange-400' : 'opacity-30'}">${new Date(t.dueDate).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' })}</span>` : '';
            const dragAttrs = isDone ? '' : `draggable="true" ondragstart="onTodoDragStart(event,'${t.id}')" ondragover="onTodoDragOver(event,'${t.id}')" ondragleave="onTodoDragLeave(event)" ondrop="onTodoDrop(event,'${t.id}')" ondragend="onTodoDragEnd()"`;
            const highBorder = (t.priority === 'high' && !isDone) ? 'border-l-2 border-red-500/60' : '';
            return `<div class="todo-item flex items-start justify-between gap-2 group/item px-3 py-2.5 rounded-2xl hover:bg-white/5 transition-all ${isDone ? 'opacity-50' : ''} ${highBorder}" data-id="${t.id}" ${dragAttrs}>
                <div class="flex items-start gap-2.5 flex-1 min-w-0">
                    ${priorityDot}
                    <div class="w-5 h-5 rounded-full border border-white/20 flex items-center justify-center flex-shrink-0 mt-[1px] transition-all cursor-pointer ${isDone ? 'bg-emerald-500 border-transparent shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'group-hover/item:border-white/50'}" onclick="toggleTodo('${t.id}')">
                        ${isDone ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="todo-text text-sm font-light tracking-wide leading-snug cursor-text outline-none ${isDone ? 'line-through opacity-60' : 'opacity-80'}" onclick="startEditTodo('${t.id}', event)">${t.text}</span>
                        ${dueDateHtml}
                    </div>
                </div>
                <button onclick="deleteTodoById('${t.id}')" class="opacity-0 group-hover/item:opacity-30 hover:!opacity-100 hover:text-red-400 transition-all p-1 flex-shrink-0 mt-0.5">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
            </div>`;
        }

        function renderTodos() {
            const active = todos.filter(t => !t.completed);
            const done   = todos.filter(t => t.completed);
            const sorted = getSortedActive(active);

            const list = document.getElementById('todo-list');
            list.innerHTML = sorted.length
                ? sorted.map(t => buildTodoItemHtml(t, false)).join('')
                : `<div class="flex flex-col items-center justify-center opacity-10 py-8"><i data-lucide="list-checks" class="w-10 h-10 mb-3"></i><p class="text-[10px] uppercase tracking-widest font-black">Empty List</p></div>`;

            const section = document.getElementById('todo-completed-section');
            const countEl = document.getElementById('todo-completed-count');
            const doneList = document.getElementById('todo-completed-list');
            const arrow = document.getElementById('todo-completed-arrow');

            if (done.length > 0) {
                section.classList.remove('hidden');
                countEl.textContent = done.length;
                if (completedSectionOpen) {
                    doneList.classList.remove('hidden');
                    doneList.innerHTML = done.map(t => buildTodoItemHtml(t, true)).join('');
                    if (arrow) arrow.style.transform = 'rotate(180deg)';
                } else {
                    doneList.classList.add('hidden');
                    if (arrow) arrow.style.transform = '';
                }
            } else {
                section.classList.add('hidden');
            }

        function startEditTodo(id, e) {
            if (e) e.stopPropagation();
            const t = todos.find(x => x.id === id);
            if (!t) return;
            const item = document.querySelector(`.todo-item[data-id="${id}"]`);
            if (!item) return;
            const span = item.querySelector('.todo-text');
            if (!span || span.isContentEditable) return;
            const oldText = t.text;
            const wasDraggable = item.getAttribute('draggable');
            item.setAttribute('draggable', 'false');
            span.contentEditable = 'true';
            span.focus();
            const range = document.createRange();
            range.selectNodeContents(span);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = (commit) => {
                span.onblur = null;
                span.onkeydown = null;
                span.contentEditable = 'false';
                if (wasDraggable !== null) item.setAttribute('draggable', wasDraggable);
                if (commit) {
                    const newText = span.innerText.trim();
                    if (newText && newText !== oldText) {
                        t.text = newText;
                        saveTodos();
                    }
                }
                renderTodos();
            };
            span.onblur = () => finish(true);
            span.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
                else if (ev.key === 'Escape') { ev.preventDefault(); span.innerText = oldText; finish(false); }
            };
        }

        function onTodoDrop(e, targetId) {
            e.preventDefault();
            if (todoDragSrcId === targetId) return;
            const srcIdx = todos.findIndex(t => t.id === todoDragSrcId);
            const tgtIdx = todos.findIndex(t => t.id === targetId);
            if (srcIdx === -1 || tgtIdx === -1) return;
            const el = document.querySelector('.todo-item[data-id="' + targetId + '"]');
            let before = true;
            if (el) {
                const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
                before = e.clientY < mid;
            }
            const [item] = todos.splice(srcIdx, 1);
            const newTgt = todos.findIndex(t => t.id === targetId);
            todos.splice(before ? newTgt : newTgt + 1, 0, item);

            localStorage.setItem('todos.manualOrder', 'true');
            saveTodos();

        async function fetchHitokoto() {
            const customRaw = localStorage.getItem(HITOKOTO_CUSTOM_KEY);
            if (customRaw) {
                try {
                    const custom = JSON.parse(customRaw);
                    if (custom && custom.text) {
                        showHitokoto(custom.text, '');
                        return;
                    }
                } catch {}
            }

            try {
                const response = await fetch('https://v1.hitokoto.cn');
                const data = await response.json();
                const text = data.hitokoto;
                const from = `— ${data.from_who || ''} 「${data.from}」`;
                localStorage.setItem(HITOKOTO_LAST_API_KEY, JSON.stringify({ text, from }));
                showHitokoto(text, from);
            } catch (err) {
                console.error('Failed to fetch hitokoto:', err);
                document.getElementById('hitokoto-container').style.display = 'none';
            }
        }
        fetchHitokoto();

            localStorage.removeItem(HITOKOTO_CUSTOM_KEY);
            try {
                const response = await fetch('https://v1.hitokoto.cn');
                const data = await response.json();
                const text = data.hitokoto;
                const from = `— ${data.from_who || ''} 「${data.from}」`;

            if (lastRaw) {

                    if (last && last.text) {

        function customizeHitokoto(e) {
            if (e) e.stopPropagation();
            const textEl = document.getElementById('hitokoto');
            const fromEl = document.getElementById('hitokoto-from');
            if (textEl.isContentEditable) return;
            const oldText = textEl.innerText;
            textEl.contentEditable = 'true';
            textEl.focus();
            const range = document.createRange();
            range.selectNodeContents(textEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            const finish = (commit) => {
                textEl.onblur = null;
                textEl.onkeydown = null;
                textEl.contentEditable = 'false';
                if (!commit) {
                    textEl.innerText = oldText;
                    return;
                }
                const newText = textEl.innerText.trim();
                if (!newText) {
                    localStorage.removeItem(HITOKOTO_CUSTOM_KEY);
                    fetchHitokoto();
                    return;
                }
                fromEl.innerText = '';
                localStorage.setItem(HITOKOTO_CUSTOM_KEY, JSON.stringify({ text: newText }));
            };
            textEl.onblur = () => finish(true);
            textEl.onkeydown = (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); textEl.blur(); }
                else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); textEl.blur(); }

            const oldTitle = note.title;
            tab.contentEditable = 'true';
            tab.focus();
            const range = document.createRange();
            range.selectNodeContents(tab);
            const sel = window.getSelection();
            sel.removeAllRanges();

            const finish = () => {

                const newTitle = tab.innerText.trim() || oldTitle;
                note.title = newTitle;

                saveNotes();

            tab.onblur = finish;
            tab.onkeydown = (ev) => {

            const remain = Math.max(0, Math.round(remainMs / 1000));
            const m = String(Math.floor(remain / 60)).padStart(2, '0');
            const sec = String(remain % 60).padStart(2, '0');

        function togglePomodoroPause() {

                delete s.remainMs;
                savePomoState(s);
                runPomoLoop();
            } else {
                s.paused = true;
                s.remainMs = Math.max(0, s.endAt - Date.now());

                renderPomoRunning(s);

        function startPomodoro() {

                phase: 'focus',
                round: 1,
                endAt: Date.now() + focusMin * 60 * 1000
            };
            savePomoState(state);
            runPomoLoop();
            document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: true } }));
        }

        function stopPomodoro() {
            if (pomodoroTick) { clearInterval(pomodoroTick); pomodoroTick = null; }

            renderPomoIdle();

        function skipPomodoro() {
            const s = loadPomoState();

        function advancePomoPhase(s) {
            const finished = s.phase;
            const finishedRound = s.round;
            if (finished === 'focus') {
                document.dispatchEvent(new CustomEvent('pomodoro:focus-complete', { detail: { round: finishedRound } }));
                notifyPomo('🍅 专注结束', '休息一下！');
                if (finishedRound >= ROUNDS) {
                    document.dispatchEvent(new CustomEvent('pomodoro:cycle-complete', { detail: { rounds: ROUNDS } }));
                    s.phase = 'long';
                } else {
                    s.phase = 'short';
                }
            } else {
                notifyPomo('🍅 休息结束', '继续加油！');
                if (finished === 'long') {
                    clearPomoState();
                    renderPomoIdle();
                    document.dispatchEvent(new CustomEvent('pet:cheer', { detail: { on: false } }));
                    return null;
                }
                s.phase = 'focus';
                s.round = finishedRound + 1;
            }
            s.endAt = Date.now() + phaseDurationMin(s) * 60 * 1000;
            savePomoState(s);
            return s;
        }

        function runPomoLoop() {
            if (pomodoroTick) clearInterval(pomodoroTick);

                if (!s) { clearInterval(pomodoroTick); pomodoroTick = null; renderPomoIdle(); return; }
                if (s.paused) { renderPomoRunning(s); return; }
                if (Date.now() >= s.endAt) {
                    s = advancePomoPhase(s);
                    if (!s) { clearInterval(pomodoroTick); pomodoroTick = null; return; }
                }
                renderPomoRunning(s);
            };
            step();
            pomodoroTick = setInterval(step, 500);

        // 输入框活跃探测：聚焦 Note 编辑器或 Todo 输入框时触发 watch

            function reset() {
                if (sleeping) {
                    sleeping = false;
                    document.dispatchEvent(new CustomEvent('pet:long-idle', { detail: { on: false } }));
                }
                clearTimeout(timer);
                timer = setTimeout(() => {

        // ===== 心情系统 =====
        const MOOD_HEART_FULL = '<svg class="mood-heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9C.8 8.5 2.8 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4.2 0 6.2 4.5 4.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>';

        function changePetMood(delta) {
            const prev = loadPetMood();

            const nextSadBand = next <= 2;

        function getPetObstacleRects() {
            // 所有玻璃面板（搜索框 + 各分栏）都是宠物的禁区（视口坐标）
            const SELECTORS = ['.search-container', '#panel-shortcuts', '#panel-note-col', '#panel-todo-col', '#panel-pet'];
            const rects = [];
            SELECTORS.forEach(sel => {
                document.querySelectorAll(sel).forEach(node => {

            const scaleX = rootRect.width / root.offsetWidth || 1;
            const scaleY = rootRect.height / root.offsetHeight || 1;
            return getPetObstacleRects().map(r => ({

            const h = root ? root.offsetHeight : window.innerHeight;
            const rects = getPetObstacleRectsLocal(root);

            const minX = MARGIN, minY = MARGIN;
            const maxX = Math.max(minX, w - PET - MARGIN);
            const maxY = Math.max(minY, h - PET - MARGIN);

            // 不开心：窝在某个角落，小幅抖动；角落仍要避开面板

                    const jy = (Math.random() - 0.5) * 30;
                    const x = Math.max(minX, Math.min(maxX, c[0] + jx));
                    const y = Math.max(minY, Math.min(maxY, c[1] + jy));
                    if (!rectOverlapsAny(x, y, PET, rects)) candidates.push({ x, y });
                }
                if (candidates.length) return candidates[Math.floor(Math.random() * candidates.length)];
                // 角落都被遮挡：退到屏幕边缘上下
                return { x: maxX, y: minY };

            for (let i = 0; i < 24; i++) {
                const x = minX + Math.random() * (maxX - minX);
                const y = minY + Math.random() * (maxY - minY);

            const petEl = document.getElementById('pet');
            if (petEl) {
                petEl.classList.remove('pinned');
                delete petEl.dataset.pinned;
                delete petEl.dataset.free;
                petEl.style.left = '0px';
                petEl.style.top = '0px';
            }
            updatePetFreeButton();
            renderPetMood();
            toggleModal('pet-reset-modal');
            showPetOnboard();
        }

        function confirmPetOnboard(type) {
            const name = document.getElementById('pet-onboard-name').value.trim();
            if (!name || !type) return;
            localStorage.setItem('pet.type', type);
            localStorage.setItem('pet.name', name);
            applyPetTypeToUI(type);
            hidePetOnboard();
        }

        // 初始化
        (function initPet() {
            const el = document.getElementById('pet');
            if (!el) return;

            // 单击宠物 → 随机播放一个小动作（1 秒）+ 刷新交互时间 + 显示心情条
            const PET_SMALL_ACTIONS = ['happy', 'celebrate'];
            let petClickTimer = null;
            el.addEventListener('click', () => {
                if (el._suppressClick) return; // 拖拽刚结束
                if (petClickTimer) return;
                petClickTimer = setTimeout(() => {
                    petClickTimer = null;
                    touchPetInteract();
                    showPetMoodBar();
                    if (loadPetMood() <= 2) return; // 心情低时屏蔽事件
                    const pick = PET_SMALL_ACTIONS[Math.floor(Math.random() * PET_SMALL_ACTIONS.length)];
                    triggerOneShotState(pick, 1000);
                }, 240);
            });
            // 双击 → 投喂；超出每日 3 次则摇头拒绝
            el.addEventListener('dblclick', () => {
                if (el._suppressClick) return;
                if (petClickTimer) { clearTimeout(petClickTimer); petClickTimer = null; }
                showPetMoodBar();
                const ok = tryFeedPet();
                if (ok) triggerFeedAnimation();
                else triggerRefuseAnimation();
            });
            // hover 显示心情条；自由模式下若在睡觉则惊醒
            el.addEventListener('mouseenter', () => {
                showPetMoodBar();
                if (typeof isPetFree === 'function' && isPetFree() && petFsm.state === 'sleeping') {
                    fsmWakeFromSleep();
                }
            });
            el.addEventListener('mouseleave', hidePetMoodBar);

            // 拖拽
            attachPetDrag();
            const savedPos = loadPetPos();
            if (savedPos && !isPetFree()) pinPetTo(savedPos.x, savedPos.y);

            // 自由活动模式：刷新后恢复
            updatePetFreeButton();
            if (isPetFree()) {
                // 等下方 applyPetTypeToUI 完成后再启动
                setTimeout(enterFreeMode, 0);
            }

            // 双击宠物头部位置（页面任意处）回到分栏：长按 1 秒可解除固定
            el.addEventListener('contextmenu', e => {
                if (el.dataset.pinned !== 'true') return;
                e.preventDefault();
                unpinPet();
            });

            // 引导交互：先填名字 → 解锁动物按钮 → 点击动物完成初始化
            document.querySelectorAll('#pet-onboard .pet-onboard-card').forEach(c => {
                c.addEventListener('click', () => {
                    if (c.disabled) return;
                    confirmPetOnboard(c.dataset.onboardPet);
                });
            });
            document.getElementById('pet-onboard-name').addEventListener('input', refreshOnboardGate);

            // 启动时结算心情 + 同步基础动画
            settlePetMoodOnLoad();
            renderPetMood();
            applyMoodToBaseState();

            // 首次启动或缺失数据 → 显示内嵌引导
            const savedType = localStorage.getItem('pet.type');
            const savedName = localStorage.getItem('pet.name');
            if (!savedType || !savedName) {
                showPetOnboard();
            } else {
                applyPetTypeToUI(savedType);
                hidePetOnboard();
            }
        })();

        window.onload = () => {
            renderGroupTabs();
            renderTodos();
            applyPanelVisibility(); // 恢复面板开关状态，内部会触发 calcAndRenderBookmarks
            // ResizeObserver：快捷方式面板宽度变化时重新计算书签布局
            const shortcutsPanelEl = document.getElementById('panel-shortcuts');
            if (shortcutsPanelEl && window.ResizeObserver) {
                const ro = new ResizeObserver(() => calcAndRenderBookmarks());
                ro.observe(shortcutsPanelEl);
            }
            const mode = localStorage.getItem('workbench_bg_mode_v8') || 'url';
            setActiveBgModeUI(mode);

            const savedUrl = localStorage.getItem('workbench_bg_url_v8');
            if(savedUrl) document.getElementById('bg-url').value = savedUrl;

            if(mode === 'local') {
                const savedLocal = localStorage.getItem('workbench_bg_local_v8');
                if(savedLocal) applyBgImageUrl(savedLocal);
            } else if (mode === 'presets') {
                const savedPreset = localStorage.getItem('workbench_bg_preset_v8');
                if(savedPreset) applyBgImageUrl(savedPreset);
            } else {
                if(savedUrl) applyBgImageUrl(savedUrl);
            }
        };
    </script>
</body>
</html>
